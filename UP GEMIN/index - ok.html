<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA DEL MERCADO v14.4</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --blue: #00d2ff;
            --txt: #e0e0e0;
            --accent: #8b5cf6;
            --border: #1a1a1a;
            --green: #00ff88;
            --red: #ff3366;
            --gold: #fbbf24;
        }

        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; font-size: 11px;
            -webkit-tap-highlight-color: transparent;
        }

        #scan-line {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--blue); box-shadow: 0 0 15px var(--blue); z-index: 100;
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: var(--surface); border-radius: 8px;
            border: 1px solid var(--border); margin-bottom: 12px;
        }

        .ai-terminal {
            background: var(--surface); border: 1px solid var(--border);
            border-top: 3px solid var(--accent); border-radius: 12px;
            padding: 15px; position: relative;
        }

        #loader-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); z-index: 50; border-radius: 12px;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .strat-box { background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; min-height: 160px;}
        .strat-box h4 { margin: 0 0 10px 0; font-size: 0.85rem; color: var(--blue); text-transform: uppercase; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; letter-spacing: 1px;}
        .strat-text { font-size: 0.88rem; line-height: 1.4; color: #ccc; flex-grow: 1; margin-bottom: 10px; }
        .strat-text b { color: var(--gold); }
        
        .tech-definitions { 
            font-size: 0.68rem; 
            color: #666; 
            background: #000; 
            padding: 6px; 
            border-radius: 4px; 
            border-top: 1px solid #111;
        }
        .tech-word { color: var(--accent); font-weight: bold; }

        .info-section { margin-bottom: 18px; }
        .section-title { font-size: 0.8rem; font-weight: 900; color: var(--blue); text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
        
        .data-card { background: #000; border: 1px solid #1a1a1a; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; text-decoration: none; transition: 0.2s; }
        .data-card:hover { border-color: var(--accent); background: #050505; }
        .data-card span:first-child { font-size: 0.6rem; color: var(--blue); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .data-card span:last-child { font-size: 1.1rem; font-weight: 900; font-family: monospace; color: var(--txt); }

        .stats-bar { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; 
            background: #0f0f0f; padding: 12px; border-radius: 8px; 
            border: 1px dashed #333; margin-top: 10px; 
        }
        .stat-item { text-align: center; }
        .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 900; margin-bottom: 4px; display: block;}
        .stat-value { color: var(--txt); font-size: 1.1rem; font-family: monospace; display: block; margin-bottom: 4px; }
        .stat-desc { font-size: 0.6rem; color: #555; line-height: 1.2; display: block; font-style: italic; }

        .update-btn { background: #fff; color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; width: 100%; margin-top: 15px; cursor: pointer; text-transform: uppercase; }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 15px; }
        .news-card { background: #080808; border: 1px solid #111; border-radius: 8px; padding: 8px; height: 100px; display: flex; flex-direction: column; }
        .news-header { color: var(--accent); font-size: 0.65rem; font-weight: 900; border-bottom: 1px solid #1a1a1a; margin-bottom: 5px; padding-bottom: 3px; }
        .news-scroll-area { overflow-y: auto; flex-grow: 1; }
        .news-item a { color: #888; text-decoration: none; font-size: 0.75rem; display: block; margin-bottom: 5px; line-height: 1.2; border-bottom: 1px solid #0f0f0f; }

        .up { color: var(--green) !important; }
        .down { color: var(--red) !important; }
        
        @media (max-width: 600px) { .strategy-grid { grid-template-columns: 1fr; } .news-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="scan-line"></div>

<div class="header">
    <div style="display:flex; align-items:center; gap:8px;">
        <a href="https://www.instagram.com/3d_mc_3d/" target="_blank">
            <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" style="width:24px; height:24px; border-radius:50%; border:2px solid var(--accent);">
        </a>
        <span style="font-weight:900; letter-spacing:1px; text-transform: uppercase;">CENTINELA <span style="color:var(--accent)">DEL MERCADO</span></span>
    </div>
    <div style="text-align: right; font-family: monospace;">
        <div id="news-counter" style="color:var(--blue); font-size: 9px; font-weight: bold; margin-bottom: 2px;">NEWS: --</div>
        <div id="t-stamp" style="color:#444; font-size: 9px;">V14.4_LINKS_FIX</div>
    </div>
</div>

<div class="ai-terminal">
    <div id="loader-overlay">
        <div style="width:30px; height:30px; border:3px solid var(--accent); border-top-color:transparent; border-radius:50%; animation: spin 0.8s linear infinite;"></div>
        <div style="margin-top:15px; text-align:center; font-family:monospace;">
            <div style="color:var(--txt); font-size:11px; font-weight:bold; text-transform:uppercase; margin-bottom:4px;">Capturando datos del mercado...</div>
            <div id="loader-sub" style="color:var(--blue); font-size:9px; text-transform:uppercase; opacity:0.8;">Iniciando scan...</div>
        </div>
    </div>

    <div class="strategy-grid">
        <div class="strat-box" style="border-left: 4px solid var(--blue);">
            <h4><i class="fas fa-user-shield"></i> PERFIL CONSERVADOR</h4>
            <div id="ai-cons" class="strat-text">--</div>
            <div id="ai-cons-glossary" class="tech-definitions"></div>
        </div>
        <div class="strat-box" style="border-left: 4px solid var(--gold);">
            <h4><i class="fas fa-fire"></i> PERFIL AGRESIVO</h4>
            <div id="ai-agres" class="strat-text">--</div>
            <div id="ai-agres-glossary" class="tech-definitions"></div>
        </div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-dollar-sign"></i> Dólar</div>
        <div id="dolar-container" class="data-grid"></div>
    </div>
    <div class="info-section">
        <div class="section-title"><i class="fas fa-wallet"></i> Remuneradas</div>
        <div id="rem-container" class="data-grid"></div>
    </div>
    <div class="info-section">
        <div class="section-title"><i class="fas fa-university"></i> Plazos Fijos</div>
        <div id="pf-container" class="data-grid"></div>
    </div>
    <div class="info-section">
        <div class="section-title"><i class="fas fa-chart-line"></i> Lecaps</div>
        <div id="lecap-container" class="data-grid"></div>
    </div>
    <div class="info-section">
        <div class="section-title"><i class="fas fa-exclamation-triangle"></i> Riesgo País</div>
        <div id="rp-container" class="data-grid"></div>
    </div>

    <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">BRECHA</span><b id="brecha-val" class="stat-value">--</b><span class="stat-desc">Blue vs Oficial</span></div>
        <div class="stat-item"><span class="stat-label">IPC</span><b id="inflacion-val" class="stat-value" style="color:var(--blue)">--</b><span class="stat-desc">Última Inflación</span></div>
        <div class="stat-item"><span class="stat-label">TASA REAL</span><b id="tasa-real-val" class="stat-value">--</b><span class="stat-desc">Rinde vs IPC</span></div>
    </div>

    <button class="update-btn" onclick="ejecutarDeepScanIA()">Sincronizar Protocolo v14.4</button>
</div>

<div id="master-grid" class="news-grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares";
    const INFLACION_API = "https://api.argentinadatos.com/v1/finanzas/indices/inflacion";
    const TASA_REF_API = "https://api.argentinadatos.com/v1/finanzas/tasas/plazoFijo";
    const RP_API = "https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais/ultimo";
    
    // CORRECCIÓN DE LINKS OFICIALES
    const remData = [
        {f: "COCOS", t: 0.32, l: "https://www.cocos.capital/"}, 
        {f: "FIWIND", t: 0.32, l: "https://www.fiwind.io/"}, 
        {f: "UALÁ", t: 0.29, l: "https://www.uala.com.ar/"}, 
        {f: "BRUBANK", t: 0.27, l: "https://www.brubank.com/"}
    ];
    const pfData = [
        {e: "REBA", t: 0.34, l: "https://www.reba.com.ar/"}, 
        {e: "BICA", t: 0.33, l: "https://www.bancobica.com.ar/"}, 
        {e: "MACRO", t: 0.28, l: "https://www.macro.com.ar/"}, 
        {e: "NACIÓN", t: 0.25, l: "https://www.bna.com.ar/"}
    ];

    const diccionario = {
        "IPC": "Índice de Precios al Consumidor (mide la inflación).",
        "Rinde Real": "Ganancia final restándole la inflación.",
        "Liquidez": "Disponibilidad inmediata del dinero.",
        "CER": "Coeficiente de Estabilización de Referencia (ajusta por inflación).",
        "Lecaps": "Letras de Capitalización que emite el Tesoro.",
        "Carry Trade": "Ganar tasa en pesos apostando a un dólar estable.",
        "Brecha": "Diferencia porcentual entre el dólar oficial y el libre.",
        "Riesgo País": "Sobreprecio que paga un país para financiarse."
    };

    function typeWriter(text, elementId, glossaryId) {
        let i = 0; const ele = document.getElementById(elementId); ele.innerHTML = "";
        const glos = document.getElementById(glossaryId); glos.innerHTML = "";
        function type() { 
            if (i < text.length) { 
                ele.innerHTML = text.substring(0, i + 1).replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--gold)">$1</b>'); 
                i++; setTimeout(type, 5); 
            } else {
                let encontrados = [];
                for (let termino in diccionario) { if (text.includes(termino)) { encontrados.push(`<span class="tech-word">${termino}:</span> ${diccionario[termino]}`); } }
                glos.innerHTML = encontrados.join("<br>");
            }
        }
        type();
    }

    async function ejecutarDeepScanIA() {
        const loader = document.getElementById('loader-overlay');
        const loaderSub = document.getElementById('loader-sub');
        const scanLine = document.getElementById('scan-line');
        loader.style.display = 'flex'; scanLine.style.display = 'block';

        const descriptores = ["Activos Remunerados", "Tasas Nominales", "Diferencial Cambiario", "Riesgo Soberano", "Inflación Proyectada"];
        const loaderInterval = setInterval(() => {
            loaderSub.innerText = `[ SCANNING: ${descriptores[Math.floor(Math.random() * descriptores.length)]} ]`;
        }, 180);

        try {
            const [resDolar, resRP, resTasa, resInf, resNews] = await Promise.all([
                fetch(DOLAR_URL).then(r => r.json()),
                fetch(RP_API).then(r => r.json()),
                fetch(TASA_REF_API).then(r => r.json()),
                fetch(INFLACION_API).then(r => r.json()),
                fetch(NEWS_URL).then(r => r.json())
            ]);

            clearInterval(loaderInterval);
            const ipcVal = resInf[resInf.length - 1].valor;
            const rpVal = resRP.valor || 0;
            const noticias = resNews.noticias || [];
            
            document.getElementById('dolar-container').innerHTML = resDolar.slice(0,4).map(d => `<div class="data-card"><span>${d.nombre.substring(0,7)}</span><span>$${Math.round(d.venta)}</span></div>`).join('');
            
            document.getElementById('rem-container').innerHTML = remData.sort((a,b)=>b.t-a.t).map(r => `
                <a href="${r.l}" target="_blank" class="data-card"><span>${r.f}</span><span class="${((r.t*100)/12) >= ipcVal ? 'up':'down'}">${((r.t*100)/12).toFixed(2)}%</span></a>
            `).join('');
            
            document.getElementById('pf-container').innerHTML = pfData.sort((a,b)=>b.t-a.t).map(p => `
                <a href="${p.l}" target="_blank" class="data-card"><span>${p.e}</span><span class="${((p.t*100)/12) >= ipcVal ? 'up':'down'}">${((p.t*100)/12).toFixed(2)}%</span></a>
            `).join('');

            const tnaRef = resTasa[resTasa.length - 1].valor || 30;
            const mensualLecap = (tnaRef/12+0.3).toFixed(2);
            document.getElementById('lecap-container').innerHTML = `<div class="data-card"><span>Tasa Ref.</span><span>${(tnaRef/12).toFixed(2)}%</span></div><div class="data-card"><span>Lecap Est.</span><span class="up">${mensualLecap}%</span></div>`;
            document.getElementById('rp-container').innerHTML = `<div class="data-card"><span>Puntos</span><span class="${rpVal < 700 ? 'up':'down'}">${rpVal}</span></div>`;

            const oficial = resDolar.find(d => d.casa === 'oficial')?.venta || 1;
            const blue = resDolar.find(d => d.casa === 'blue')?.venta || 1;
            const brecha = ((blue/oficial)-1)*100;
            const tasaR = ((pfData[0].t * 100) / 12) - ipcVal;

            loader.style.display = 'none'; scanLine.style.display = 'none';

            const cCons = `Con un **IPC del ${ipcVal}%**, tu prioridad debe ser mantener el poder de compra. El **Rinde Real** actual es de **${tasaR.toFixed(2)}%**. Si este valor es negativo, el Plazo Fijo no es suficiente. Te aconsejo diversificar: mantén **Liquidez** en cuentas remuneradas para gastos diarios, pero considera instrumentos ajustados por **CER** si el horizonte es mayor a 30 días para cubrirte de saltos inflacionarios.`;
            const cAgre = `La **Brecha** del **${brecha.toFixed(1)}%** y el descenso del **Riesgo País** a **${rpVal}** sugieren un escenario ideal para el **Carry Trade**. Las **Lecaps** rinden hoy un estimado de **${mensualLecap}%** mensual, superando ampliamente la devaluación programada. Es momento de maximizar tasa en pesos, monitoreando que la brecha no se dispare por encima del 20%, lo cual invalidaría la estrategia.`;

            typeWriter(cCons, "ai-cons", "ai-cons-glossary");
            typeWriter(cAgre, "ai-agres", "ai-agres-glossary");

            document.getElementById('brecha-val').innerText = `${brecha.toFixed(1)}%`;
            document.getElementById('inflacion-val').innerText = `${ipcVal}%`;
            document.getElementById('tasa-real-val').innerText = `${tasaR.toFixed(2)}%`;
            document.getElementById('tasa-real-val').style.color = tasaR >= 0 ? 'var(--green)' : 'var(--red)';

            const unicas = noticias.filter((n, i, s) => s.findIndex(x => x.titulo === n.titulo) === i);
            document.getElementById('news-counter').innerText = `NEWS: ${unicas.length}`;
            const agrup = unicas.reduce((acc, n) => { if(!acc[n.fuente]) acc[n.fuente] = []; acc[n.fuente].push(n); return acc; }, {});
            document.getElementById('master-grid').innerHTML = Object.keys(agrup).map(f => `
                <div class="news-card"><div class="news-header">${f}</div><div class="news-scroll-area">${agrup[f].map(n => `<div class="news-item"><a href="${n.link}" target="_blank">${n.titulo}</a></div>`).join('')}</div></div>
            `).join('');

        } catch (e) { clearInterval(loaderInterval); loaderSub.innerText = "Error Técnico"; setTimeout(() => { loader.style.display = 'none'; }, 2000); }
    }
    document.addEventListener('DOMContentLoaded', ejecutarDeepScanIA);
</script>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>

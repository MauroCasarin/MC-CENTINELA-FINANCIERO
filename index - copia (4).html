<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA AI v7.0 - ESTRATEGIA TOTAL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--accent:#8b5cf6;--border:#1e293b;--gold:#fbbf24;--green:#10b981;--orange:#fb923c;--red:#ef4444;--yellow:#fbbf24}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:4px; font-size: 8px; overflow-x:hidden}
        
        /* Layout */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; background: #0f172a; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 4px; }
        .logo { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--blue); }

        .ai-terminal {
            background: linear-gradient(145deg, #0f172a, #131e35);
            border: 1px solid var(--border); border-top: 2px solid var(--accent);
            border-radius: 4px; padding: 6px; margin-bottom: 4px;
        }

        .strategy-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin: 4px 0 6px 0; }
        .strat-box { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 5px; position: relative; overflow: hidden; }
        .strat-box h4 { margin: 0 0 3px 0; font-size: 0.55rem; text-transform: uppercase; display: flex; align-items: center; gap: 3px; }
        .strat-cons { border-left: 2px solid var(--blue); }
        .strat-agres { border-left: 2px solid var(--orange); }
        .strat-text { font-size: 0.58rem; line-height: 1.2; color: #cbd5e1; min-height: 35px; }
        .strat-text b { color: var(--gold); }

        .section-label { font-size: 0.45rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin: 4px 0 2px 0; display: block; letter-spacing: 0.2px; }
        .nano-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
        .badge { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 1px 3px; border-radius: 2px; display: flex; align-items: center; gap: 2px; }
        .b-name { color: #94a3b8; font-size: 0.4rem; text-transform: uppercase; font-weight: bold; }
        .b-val { font-weight: 700; font-size: 0.55rem; }
        
        .up { color: var(--green) !important; }
        .down { color: var(--red) !important; }
        .neutral { color: var(--blue); }

        .ai-stats { display: flex; flex-wrap: wrap; gap: 6px; font-size: 0.5rem; color: #64748b; margin-top: 4px; padding-top: 2px; border-top: 1px solid rgba(255,255,255,0.05); }
        .update-btn { background: var(--accent); color: white; border: none; padding: 5px; border-radius: 2px; font-weight: bold; cursor: pointer; font-size: 0.6rem; width: 100%; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 2px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; height: 95px; display: flex; flex-direction: column; }
        .card-h { padding: 2px 5px; background: rgba(255,255,255,0.04); font-size: 0.45rem; font-weight: 900; color: var(--blue); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .card-b { padding: 2px 4px; overflow-y: auto; flex-grow: 1; scrollbar-width: none; }
        .news-item a { color: #94a3b8; text-decoration: none; font-size: 0.5rem; display: block; line-height: 1.1; margin-bottom: 3px; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:4px;">
        <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" class="logo">
        <span style="font-weight:900; color:var(--blue);">CENTINELA AI v7.0</span>
    </div>
    <div id="t-stamp" style="color:var(--green); font-size:0.45rem;">--:--:--</div>
</div>

<div class="ai-terminal">
    <div class="strategy-container">
        <div class="strat-box strat-cons">
            <h4><i class="fas fa-microchip"></i> Veredicto Moderado</h4>
            <div id="ai-cons" class="strat-text">Procesando mercado...</div>
        </div>
        <div class="strat-box strat-agres">
            <h4><i class="fas fa-fire"></i> Veredicto Agresivo</h4>
            <div id="ai-agres" class="strat-text">Calculando riesgo...</div>
        </div>
    </div>

    <span class="section-label">Mercado Cambiario</span>
    <div id="dolar-container" class="nano-grid"></div>

    <span class="section-label">Instrumentos en Pesos (Tasa Mensual)</span>
    <div id="rem-container" class="nano-grid"></div>
    <div id="pf-container" class="nano-grid"></div>
    <div id="lecap-container" class="nano-grid"></div>

    <span class="section-label">Indicador de Confianza</span>
    <div id="rp-container" class="nano-grid"></div>

    <div class="ai-stats">
        <span>BRECHA: <b id="brecha-val" style="color:var(--gold)">--%</b></span>
        <span>IPC PROY: <b id="inflacion-val" style="color:var(--blue)">--%</b></span>
        <span>TASA REAL: <b id="tasa-real-val">--%</b></span>
    </div>

    <button class="update-btn" onclick="ejecutarAnalisisIA()">Escaneo de Inteligencia Total</button>
</div>

<div id="master-grid" class="grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares";
    const INFLACION_API = "https://api.argentinadatos.com/v1/finanzas/indices/inflacion";
    const TASA_REF_API = "https://api.argentinadatos.com/v1/finanzas/tasas/plazoFijo";
    const RP_API = "https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais/ultimo";
    
    const remData = [
        {f: "BELO", t: 0.245}, {f: "BNA", t: 0.22}, {f: "BRUBANK", t: 0.27}, {f: "C4", t: 0.32},
        {f: "FIWIND", t: 0.32}, {f: "MONTEMAR", t: 0.25}, {f: "NX", t: 0.25}, {f: "SUP.", t: 0.205},
        {f: "Ualá", t: 0.23}, {f: "U. P1", t: 0.26}, {f: "U. P2", t: 0.29}
    ];

    const pfData = [
        {e: "Nación", t: 0.25}, {e: "Sant.", t: 0.23}, {e: "Galicia", t: 0.23}, {e: "Prov.", t: 0.25},
        {e: "BBVA", t: 0.24}, {e: "Macro", t: 0.28}, {e: "Reba", t: 0.34}, {e: "Bica", t: 0.33}
    ];

    async function ejecutarAnalisisIA() {
        try {
            const [resNews, resDolar, resInf, resTasa, resRP] = await Promise.all([
                fetch(NEWS_URL).then(r => r.json()),
                fetch(DOLAR_URL).then(r => r.json()),
                fetch(INFLACION_API).then(r => r.json()),
                fetch(TASA_REF_API).then(r => r.json()),
                fetch(RP_API).then(r => r.json())
            ]);

            const noticias = resNews.noticias || [];
            const dolares = resDolar || [];
            const ipcVal = resInf[resInf.length - 1].valor;
            const riesgoPais = resRP.valor || 0;
            const oficial = dolares.find(d => d.casa === 'oficial')?.venta || 1;
            const blue = dolares.find(d => d.casa === 'blue')?.venta || 1;
            const brecha = ((blue/oficial)-1)*100;

            // Cálculos de Tasas
            const mejorTNA = Math.max(...remData.map(r => r.t), ...pfData.map(p => p.t));
            const mejorMensual = (mejorTNA * 100) / 12;
            const tasaReal = mejorMensual - ipcVal;

            // Renderizado de UI
            document.getElementById('dolar-container').innerHTML = dolares.slice(0,4).map(d => `
                <div class="badge"><span class="b-name">${d.nombre.replace('Contado con liquidación', 'CCL').replace('Oficial', 'OFI')}</span><span class="b-val neutral">$${Math.round(d.venta)}</span></div>
            `).join('');

            document.getElementById('rem-container').innerHTML = remData.sort((a,b)=>b.t-a.t).slice(0,3).map(r => `
                <div class="badge"><span class="b-name">${r.f}</span><span class="b-val ${((r.t*100)/12) >= ipcVal ? 'up':'down'}">${((r.t*100)/12).toFixed(2)}%</span></div>
            `).join('');

            document.getElementById('rp-container').innerHTML = `
                <div class="badge"><span class="b-name">RIESGO PAÍS</span><span class="b-val ${riesgoPais < 700 ? 'up' : 'down'}">${riesgoPais} pts</span></div>
                <div class="badge"><span class="b-name">ESTADO</span><span class="b-val neutral">${riesgoPais < 600 ? 'COMPRIMIENDO' : 'VOLÁTIL'}</span></div>
            `;

            // --- CEREBRO DE LA IA: VEREDICTO FINAL ---
            let analisisCons = "";
            let analisisAgres = "";

            // Lógica para el Moderado (Protección de Capital)
            if (tasaReal > 0) {
                analisisCons = `Inflación controlada (${ipcVal}%). Las tasas pagan **${mejorMensual.toFixed(2)}%**, ganándole al IPC. Quedate en **Pesos (Remuneradas)** para liquidez inmediata.`;
            } else {
                analisisCons = `Alerta: Tasa real negativa. La inflación (${ipcVal}%) devora tus pesos. Migrá a **Dólar MEP** o **PF UVA** para no perder poder de compra.`;
            }

            // Lógica para el Agresivo (Maximización de Ganancia)
            if (riesgoPais < 600 && brecha < 20) {
                analisisAgres = `¡OPORTUNIDAD HISTÓRICA! Riesgo País en **${riesgoPais}** y brecha baja. El mercado vuela: Entrá fuerte en **Bonos Soberanos (AL30)** y **Lecaps** para capturar subas de capital.`;
            } else if (riesgoPais > 800 || brecha > 40) {
                analisisAgres = `PELIGRO: Inestabilidad alta. El veredicto es **Dolarización Total**. Buscá CEDEARS de empresas defensivas (Apple/Google) para cubrirte de un salto del tipo de cambio.`;
            } else {
                analisisAgres = `Escenario mixto. Hacé **Carry Trade** corto en **${remData.find(r => r.t*100/12 === mejorMensual)?.f || 'Billeteras'}** y vigilá el Riesgo País. Si toca 500, comprá bonos.`;
            }

            document.getElementById('ai-cons').innerHTML = analisisCons.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            document.getElementById('ai-agres').innerHTML = analisisAgres.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');

            // Actualizar Stats
            document.getElementById('brecha-val').innerText = `${brecha.toFixed(1)}%`;
            document.getElementById('inflacion-val').innerText = `${ipcVal}%`;
            document.getElementById('tasa-real-val').innerText = `${tasaReal.toFixed(2)}%`;
            document.getElementById('tasa-real-val').className = tasaReal > 0 ? 'up' : 'down';
            document.getElementById('t-stamp').innerText = new Date().toLocaleTimeString();

            // Render Noticias
            const agrupados = noticias.reduce((acc, n) => {
                if(!acc[n.fuente]) acc[n.fuente] = [];
                acc[n.fuente].push(n);
                return acc;
            }, {});
            document.getElementById('master-grid').innerHTML = Object.keys(agrupados).map(f => `
                <div class="card"><div class="card-h">${f}</div><div class="card-b">${agrupados[f].map(n => `<div class="news-item"><a href="${n.link}" target="_blank">${n.titulo}</a></div>`).join('')}</div></div>
            `).join('');

        } catch (e) { console.error("Error Crítico IA:", e); }
    }
    document.addEventListener('DOMContentLoaded', ejecutarAnalisisIA);
</script>
</body>
</html>

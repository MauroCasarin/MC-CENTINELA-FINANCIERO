<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA NANO-IA v5</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--accent:#8b5cf6;--border:#1e293b;--gold:#fbbf24;--green:#10b981;--orange:#fb923c}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:4px; font-size: 8px; overflow-x:hidden}
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; background: #0f172a; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 4px; }
        .logo { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--blue); }

        .ai-terminal {
            background: linear-gradient(145deg, #0f172a, #131e35);
            border: 1px solid var(--border); border-top: 2px solid var(--accent);
            border-radius: 4px; padding: 6px; margin-bottom: 4px;
        }

        .section-label { font-size: 0.45rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin: 3px 0 1px 0; display: block; letter-spacing: 0.3px; }
        .nano-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 3px; }
        
        .badge { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border); 
            padding: 1px 3px; border-radius: 2px; display: flex; align-items: center; gap: 2px;
        }
        .b-name { color: #94a3b8; font-size: 0.4rem; text-transform: uppercase; font-weight: bold; }
        .b-val { color: var(--blue); font-weight: 700; font-size: 0.55rem; }
        .b-pf { color: var(--green); }
        .b-rem { color: var(--orange); }

        .ai-stats { 
            display: flex; gap: 6px; font-size: 0.5rem; color: #64748b; 
            margin: 3px 0; padding-bottom: 2px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .verdict-box { 
            font-size: 0.75rem; line-height: 1.1; color: #cbd5e1; 
            border-left: 2px solid var(--accent); padding-left: 5px; margin: 4px 0;
        }
        .verdict-box b { color: var(--gold); font-weight: 700; }

        .update-btn { background: var(--accent); color: white; border: none; padding: 2px 6px; border-radius: 2px; font-weight: bold; cursor: pointer; font-size: 0.55rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 2px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; height: 110px; display: flex; flex-direction: column; }
        .card-h { padding: 2px 5px; background: rgba(255,255,255,0.04); font-size: 0.45rem; font-weight: 900; color: var(--blue); border-bottom: 1px solid var(--border); text-transform: uppercase; overflow: hidden; }
        .card-b { padding: 2px 4px; overflow-y: auto; flex-grow: 1; scrollbar-width: none; }
        
        .news-item { padding: 1px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .news-item a { color: #94a3b8; text-decoration: none; font-size: 0.55rem; display: block; line-height: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:4px;">
        <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" class="logo">
        <span style="font-weight:900; color:var(--blue); letter-spacing:0.1px">CENTINELA NANO v5</span>
    </div>
    <div id="t-stamp" style="color:var(--green); font-size:0.45rem; font-weight:bold;">--:--:--</div>
</div>

<div class="ai-terminal">
    <span class="section-label">Dólar</span>
    <div id="dolar-container" class="nano-grid"></div>

    <span class="section-label">Remuneradas (TNA)</span>
    <div id="rem-container" class="nano-grid"></div>

    <span class="section-label">Plazos Fijos (TNA)</span>
    <div id="pf-container" class="nano-grid"></div>

    <div class="ai-stats">
        <span>F: <b id="f-count" style="color:var(--accent)">--</b></span>
        <span>N: <b id="n-count" style="color:var(--accent)">--</b></span>
        <span>B: <b id="brecha-val" style="color:var(--gold)">--%</b></span>
    </div>
    
    <div id="verdicto" class="verdict-box">Cargando señales...</div>
    <button class="update-btn" onclick="generarAnalisisReal()">RECARGAR</button>
</div>

<div id="master-grid" class="grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares";
    
    const remData = [
        {f: "BELO", t: 0.245}, {f: "BNA", t: 0.22}, {f: "BRUBANK", t: 0.27}, {f: "C4", t: 0.32},
        {f: "FIWIND", t: 0.32}, {f: "MONTEMAR", t: 0.25}, {f: "NX", t: 0.25}, {f: "SUP.", t: 0.205},
        {f: "Ualá", t: 0.23}, {f: "U. P1", t: 0.26}, {f: "U. P2", t: 0.29}
    ];

    const pfData = [
        {e: "Nación", t: 0.25}, {e: "Sant.", t: 0.23}, {e: "Galicia", t: 0.23}, {e: "Prov.", t: 0.25},
        {e: "BBVA", t: 0.24}, {e: "Macro", t: 0.28}, {e: "Reba", t: 0.34}, {e: "Bica", t: 0.33}
    ];

    async function generarAnalisisReal() {
        const out = document.getElementById('verdicto');
        const dContainer = document.getElementById('dolar-container');
        const remContainer = document.getElementById('rem-container');
        const pfContainer = document.getElementById('pf-container');
        
        try {
            const [resNews, resDolar] = await Promise.all([
                fetch(NEWS_URL).then(r => r.json()),
                fetch(DOLAR_URL).then(r => r.json())
            ]);

            const noticias = resNews.noticias || [];
            const dolares = resDolar || [];

            dContainer.innerHTML = dolares.map(d => `
                <div class="badge"><span class="b-name">${d.nombre.replace('Contado con liquidación', 'CCL').replace('Oficial', 'OFI')}</span><span class="b-val">$${Math.round(d.venta)}</span></div>
            `).join('');

            remContainer.innerHTML = remData.map(r => `
                <div class="badge"><span class="b-name">${r.f}</span><span class="b-val b-rem">${(r.t * 100).toFixed(1)}%</span></div>
            `).join('');

            pfContainer.innerHTML = pfData.map(p => `
                <div class="badge"><span class="b-name">${p.e}</span><span class="b-val b-pf">${(p.t * 100).toFixed(0)}%</span></div>
            `).join('');

            const oficial = dolares.find(d => d.casa === 'oficial')?.venta || 1;
            const blue = dolares.find(d => d.casa === 'blue')?.venta || 1;
            const brecha = (((blue / oficial) - 1) * 100).toFixed(1);

            document.getElementById('f-count').innerText = new Set(noticias.map(n => n.fuente)).size;
            document.getElementById('n-count').innerText = noticias.length;
            document.getElementById('brecha-val').innerText = `${brecha}%`;
            document.getElementById('t-stamp').innerText = new Date().toLocaleTimeString();

            out.innerHTML = `IA: **${brecha > 10 ? 'Cobertura' : 'Tasa'}**. Foco en **${noticias.length > 30 ? 'Volatilidad' : 'Estabilidad'}**.`.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--gold)">$1</b>');

            const agrupados = noticias.reduce((acc, n) => {
                if(!acc[n.fuente]) acc[n.fuente] = [];
                acc[n.fuente].push(n);
                return acc;
            }, {});

            document.getElementById('master-grid').innerHTML = Object.keys(agrupados).map(f => `
                <div class="card">
                    <div class="card-h">${f}</div>
                    <div class="card-b">${agrupados[f].map(n => `<div class="news-item"><a href="${n.link || '#'}" target="_blank">${n.titulo}</a></div>`).join('')}</div>
                </div>
            `).join('');
        } catch (e) { out.innerHTML = "Error..."; }
    }
    document.addEventListener('DOMContentLoaded', generarAnalisisReal);
</script>
</body>
</html>

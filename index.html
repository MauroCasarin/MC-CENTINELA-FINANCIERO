<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM CENTINELA v12 - ESTRUCTURA CLARA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --blue: #00d2ff;
            --txt: #e0e0e0;
            --accent: #8b5cf6;
            --border: #1a1a1a;
            --green: #00ff88;
            --red: #ff3366;
            --gold: #fbbf24;
        }

        body {
            background-color: var(--bg);
            color: var(--txt);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px; font-size: 11px;
        }

        /* Scan Line Animation */
        #scan-line {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--blue); box-shadow: 0 0 15px var(--blue); z-index: 100;
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px; background: var(--surface); border-radius: 8px;
            border: 1px solid var(--border); margin-bottom: 12px;
        }

        .ai-terminal {
            background: var(--surface); border: 1px solid var(--border);
            border-top: 3px solid var(--accent); border-radius: 12px;
            padding: 15px; position: relative;
        }

        /* Loader mejorado */
        #loader-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 50; border-radius: 12px;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* CONTENEDORES DE INFORMACIÓN ESPECÍFICA */
        .info-section { margin-bottom: 18px; }
        
        .section-title {
            font-size: 0.8rem; font-weight: 900; color: var(--blue);
            text-transform: uppercase; margin-bottom: 8px; display: flex;
            align-items: center; gap: 8px; letter-spacing: 1px;
        }
        .section-title i { font-size: 0.9rem; color: var(--accent); }

        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }

        .data-card {
            background: #000; border: 1px solid #1a1a1a;
            padding: 10px; border-radius: 6px; display: flex; flex-direction: column;
        }
        .data-card span:first-child { font-size: 0.6rem; color: #666; font-weight: bold; text-transform: uppercase; }
        .data-card span:last-child { font-size: 1.1rem; font-weight: 900; font-family: monospace; margin-top: 4px; }

        /* Veredictos IA */
        .strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .strat-box { background: #050505; border: 1px solid #1a1a1a; border-radius: 8px; padding: 12px; }
        .strat-box h4 { margin: 0 0 5px 0; font-size: 0.75rem; color: #555; text-transform: uppercase; }
        .strat-text { font-size: 0.9rem; line-height: 1.4; color: #bbb; }

        /* Stats Bar inferior */
        .stats-bar {
            display: flex; justify-content: space-around; background: #0f0f0f;
            padding: 12px; border-radius: 8px; border: 1px dashed #222; margin-top: 10px;
        }
        .stats-bar div { font-size: 0.75rem; color: #666; font-weight: bold; }
        .stats-bar b { color: var(--txt); font-size: 0.95rem; display: block; }

        .update-btn {
            background: #fff; color: #000; border: none; padding: 14px;
            border-radius: 8px; font-weight: 900; width: 100%; margin-top: 15px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Noticias */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 15px; }
        .news-card { background: #080808; border: 1px solid #111; border-radius: 8px; padding: 10px; }
        .news-header { color: var(--accent); font-size: 0.7rem; font-weight: 900; border-bottom: 1px solid #1a1a1a; margin-bottom: 8px; padding-bottom: 4px; }
        .news-item a { color: #aaa; text-decoration: none; font-size: 0.8rem; display: block; margin-bottom: 6px; line-height: 1.3; }

        .up { color: var(--green); }
        .down { color: var(--red); }
        
        @media (max-width: 600px) { .strategy-grid { grid-template-columns: 1fr; } .news-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<div id="scan-line"></div>

<div class="header">
    <div style="display:flex; align-items:center; gap:8px;">
        <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" style="width:20px; height:20px; border-radius:50%; border:1px solid var(--accent);">
        <span style="font-weight:900; letter-spacing:1px;">QUANTUM <span style="color:var(--accent)">CENTINELA</span></span>
    </div>
    <div id="t-stamp" style="font-family:monospace; color:#444;">IDLE_MODE</div>
</div>

<div class="ai-terminal">
    <div id="loader-overlay">
        <div style="width:30px; height:30px; border:3px solid var(--accent); border-top-color:transparent; border-radius:50%; animation: spin 0.8s linear infinite;"></div>
        <div id="loader-text" style="color:var(--accent); font-weight:bold; margin-top:10px; font-family:monospace;">SCANN_RUNNING...</div>
        <div id="loader-sub" style="color:#555; font-size:9px; margin-top:5px; text-transform:uppercase;">Iniciando Protocolos</div>
    </div>

    <div class="strategy-grid">
        <div class="strat-box" style="border-left: 3px solid var(--blue);">
            <h4>ANÁLISIS MODERADO</h4>
            <div id="ai-cons" class="strat-text">--</div>
        </div>
        <div class="strat-box" style="border-left: 3px solid var(--gold);">
            <h4>ANÁLISIS AGRESIVO</h4>
            <div id="ai-agres" class="strat-text">--</div>
        </div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-dollar-sign"></i> Dólar</div>
        <div id="dolar-container" class="data-grid"></div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-wallet"></i> Remuneradas (Top Rinde)</div>
        <div id="rem-container" class="data-grid"></div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-university"></i> Plazos Fijos (Top Rinde)</div>
        <div id="pf-container" class="data-grid"></div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-chart-line"></i> Lecaps (Mensual Est.)</div>
        <div id="lecap-container" class="data-grid"></div>
    </div>

    <div class="info-section">
        <div class="section-title"><i class="fas fa-exclamation-triangle"></i> Riesgo País</div>
        <div id="rp-container" class="data-grid"></div>
    </div>

    <div class="stats-bar">
        <div>BRECHA <b id="brecha-val">--</b></div>
        <div>IPC <b id="inflacion-val" style="color:var(--blue)">--</b></div>
        <div>TASA REAL <b id="tasa-real-val">--</b></div>
    </div>

    <button class="update-btn" onclick="ejecutarDeepScanIA()">Sincronizar y Escanear Mercado</button>
</div>

<div id="master-grid" class="news-grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares";
    const INFLACION_API = "https://api.argentinadatos.com/v1/finanzas/indices/inflacion";
    const TASA_REF_API = "https://api.argentinadatos.com/v1/finanzas/tasas/plazoFijo";
    const RP_API = "https://api.argentinadatos.com/v1/finanzas/indices/riesgo-pais/ultimo";
    
    const remData = [{f: "C4", t: 0.32}, {f: "FIWIND", t: 0.32}, {f: "U. P2", t: 0.29}, {f: "BRUBANK", t: 0.27}];
    const pfData = [{e: "Reba", t: 0.34}, {e: "Bica", t: 0.33}, {e: "Macro", t: 0.28}, {e: "Nación", t: 0.25}];

    function typeWriter(text, elementId) {
        let i = 0; const ele = document.getElementById(elementId); ele.innerHTML = "";
        function type() { if (i < text.length) { ele.innerHTML = text.substring(0, i + 1).replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--gold)">$1</b>'); i++; setTimeout(type, 10); } }
        type();
    }

    async function ejecutarDeepScanIA() {
        const loader = document.getElementById('loader-overlay');
        const loaderSub = document.getElementById('loader-sub');
        const scanLine = document.getElementById('scan-line');
        loader.style.display = 'flex'; scanLine.style.display = 'block';

        const logs = ["Escaneando Dólares", "Consultando Tasas", "Leyendo Noticias", "Calculando IPC", "Analizando Riesgo"];
        let lIdx = 0; const logInt = setInterval(() => { loaderSub.innerText = logs[lIdx]; lIdx = (lIdx + 1) % logs.length; }, 500);

        try {
            const [resNews, resDolar, resInf, resTasa, resRP] = await Promise.all([
                fetch(NEWS_URL).then(r => r.json()), fetch(DOLAR_URL).then(r => r.json()),
                fetch(INFLACION_API).then(r => r.json()), fetch(TASA_REF_API).then(r => r.json()), fetch(RP_API).then(r => r.json())
            ]);

            const noticias = resNews.noticias || [];
            const ipcVal = resInf[resInf.length - 1].valor;
            const riesgoPais = resRP.valor || 0;
            const dolares = resDolar || [];

            // 1. Dólar
            document.getElementById('dolar-container').innerHTML = dolares.slice(0,4).map(d => `
                <div class="data-card"><span>${d.nombre.substring(0,7)}</span><span class="neutral">$${Math.round(d.venta)}</span></div>
            `).join('');

            // 2. Remuneradas
            document.getElementById('rem-container').innerHTML = remData.map(r => `
                <div class="data-card"><span>${r.f}</span><span class="${((r.t*100)/12) >= ipcVal ? 'up':'down'}">${((r.t*100)/12).toFixed(2)}%</span></div>
            `).join('');

            // 3. Plazos Fijos
            document.getElementById('pf-container').innerHTML = pfData.map(p => `
                <div class="data-card"><span>${p.e}</span><span class="${((p.t*100)/12) >= ipcVal ? 'up':'down'}">${((p.t*100)/12).toFixed(2)}%</span></div>
            `).join('');

            // 4. Lecaps
            const tnaRef = resTasa[resTasa.length - 1].valor || 30;
            document.getElementById('lecap-container').innerHTML = `
                <div class="data-card"><span>Tasa Ref.</span><span>${(tnaRef/12).toFixed(2)}%</span></div>
                <div class="data-card"><span>Lecap Est.</span><span class="up">${(tnaRef/12+0.3).toFixed(2)}%</span></div>
            `;

            // 5. Riesgo País
            document.getElementById('rp-container').innerHTML = `
                <div class="data-card"><span>Puntos</span><span class="${riesgoPais < 700 ? 'up':'down'}">${riesgoPais}</span></div>
            `;

            // Análisis
            const mejorM = (pfData[0].t * 100) / 12;
            const tasaR = mejorM - ipcVal;
            const oficial = dolares.find(d => d.casa === 'oficial')?.venta || 1;
            const blue = dolares.find(d => d.casa === 'blue')?.venta || 1;
            const brecha = ((blue/oficial)-1)*100;

            clearInterval(logInt); loader.style.display = 'none'; scanLine.style.display = 'none';

            typeWriter(`Tasa real de **${tasaR.toFixed(2)}%**. Con IPC en ${ipcVal}%, el sistema recomienda mantener liquidez en billeteras.`, "ai-cons");
            setTimeout(() => typeWriter(`Riesgo País en **${riesgoPais}**. Mercado con volatilidad moderada. Priorizar activos defensivos.`, "ai-agres"), 1000);

            document.getElementById('brecha-val').innerText = `${brecha.toFixed(1)}%`;
            document.getElementById('inflacion-val').innerText = `${ipcVal}%`;
            document.getElementById('tasa-real-val').innerText = `${tasaR.toFixed(2)}%`;
            document.getElementById('t-stamp').innerText = "ONLINE: " + new Date().toLocaleTimeString();

            // Noticias Únicas
            const seen = new Set();
            const unicas = noticias.filter(n => {
                const t = n.titulo.toLowerCase().trim();
                if(!seen.has(t)){ seen.add(t); return true; } return false;
            });
            const agrup = unicas.reduce((acc, n) => { if(!acc[n.fuente]) acc[n.fuente] = []; acc[n.fuente].push(n); return acc; }, {});
            
            document.getElementById('master-grid').innerHTML = Object.keys(agrup).map(f => `
                <div class="news-card"><div class="news-header">${f}</div><div class="news-items">${agrup[f].map(n => `<div class="news-item"><a href="${n.link}" target="_blank">${n.titulo}</a></div>`).join('')}</div></div>
            `).join('');

        } catch (e) { clearInterval(logInt); loader.style.display = 'none'; }
    }
    document.addEventListener('DOMContentLoaded', ejecutarDeepScanIA);
</script>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>

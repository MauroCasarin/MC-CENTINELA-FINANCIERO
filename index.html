<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - TERMINAL DE INTELIGENCIA MASIVA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--border:#1e293b;--gold:#fbbf24;--accent:#8b5cf6;--green:#10b981}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:5px; font-size: 10px}
        
        /* HEADER ULTRA COMPACTO */
        .top-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; background: #0f172a; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-img { width: 24px; height: 24px; border-radius: 50%; }
        .brand-name { font-weight: 900; color: var(--blue); font-size: 0.8rem; }

        /* ANALISTA DE DATOS MASIVOS */
        .ai-terminal {
            background: linear-gradient(145deg, #0f172a, #1a1b3a);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            border-radius: 6px;
            padding: 12px;
            margin: 8px 5px;
        }
        .ai-stats { display: flex; gap: 15px; margin-bottom: 8px; font-size: 0.65rem; font-weight: bold; color: var(--blue); }
        .ai-verdict-text { font-size: 0.95rem; line-height: 1.4; color: #f8fafc; border-left: 2px solid var(--accent); padding-left: 12px; }
        
        .update-btn { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 3px; font-size: 0.65rem; font-weight: bold; cursor: pointer; }

        /* GRILLA DE DIARIOS MINIATURA */
        .news-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); 
            gap: 5px; 
            padding: 5px;
        }
        .news-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            height: 220px; 
            display: flex; 
            flex-direction: column; 
            transition: 0.2s;
        }
        .news-card:hover { border-color: var(--accent); background: #131e35; }
        .card-header { 
            padding: 3px 8px; 
            background: rgba(255,255,255,0.03); 
            border-bottom: 1px solid var(--border); 
            font-size: 0.6rem; 
            font-weight: 900; 
            color: var(--blue); 
        }
        .news-body { padding: 2px; overflow-y: auto; flex-grow: 1; }
        .item { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.02); line-height: 1.1; }
        .item a { color: #94a3b8; text-decoration: none; font-size: 0.72rem; }
        .item a:hover { color: #fff; }

        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }
    </style>
</head>
<body>

<div class="top-header">
    <div class="logo-area">
        <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" class="logo-img">
        <span class="brand-name">CENTINELA BIG DATA</span>
    </div>
    <div id="status-clock" style="color: var(--green); font-weight: bold;">LIVE SCANNER</div>
</div>

<div class="ai-terminal">
    <div class="ai-stats">
        <span id="count-sources"><i class="fas fa-database"></i> Fuentes: --</span>
        <span id="count-news"><i class="fas fa-newspaper"></i> Titulares: --</span>
        <span id="ai-confidence" style="color:var(--gold)"></span>
    </div>
    <div id="ai-verdict" class="ai-verdict-text">
        Procesando flujo masivo de información financiera...
    </div>
    <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
        <button class="update-btn" onclick="analizarTodo()">
            <i class="fas fa-sync-alt"></i> RE-ESCANEAR TODAS LAS FUENTES
        </button>
        <span id="last-update" style="font-size: 0.6rem; color: #64748b;"></span>
    </div>
</div>

<div id="master-grid" class="news-grid"></div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwimyVoLDfgkhMsm5eTS5wBsp3sio_PhQaxcmXAq6GyDfxRHSQ29NvV2m9N22XjwD_gfQ/exec";

    async function analizarTodo() {
        const out = document.getElementById('ai-verdict');
        const btn = document.querySelector('.update-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> ESCANEANDO NODOS...';
        
        try {
            const res = await fetch(GOOGLE_URL);
            const data = await res.json();
            const noticias = data.noticias;
            
            // 1. ESTADÍSTICAS MASIVAS
            const fuentes = [...new Set(noticias.map(n => n.fuente))];
            document.getElementById('count-sources').innerHTML = `<i class="fas fa-database"></i> Fuentes: ${fuentes.length}`;
            document.getElementById('count-news').innerHTML = `<i class="fas fa-newspaper"></i> Titulares: ${noticias.length}`;

            // 2. MOTOR DE IA (Análisis de Sentimiento y Frecuencia)
            const globalText = noticias.map(n => n.titulo.toLowerCase()).join(" ");
            
            const pesos = {
                lecap: (globalText.match(/lecap|letra|tesoro|licitacion|tasa/g) || []).length,
                dolar: (globalText.match(/dolar|blue|mep|ccl|brecha|cambiario/g) || []).length,
                merval: (globalText.match(/merval|acciones|ypf|galicia|pampa/g) || []).length,
                bonos: (globalText.match(/al30|gd30|bonos|riesgo pais|soberanos/g) || []).length
            };

            const totalMenciones = pesos.lecap + pesos.dolar + pesos.merval + pesos.bonos;
            const confianza = Math.min(100, (totalMenciones / noticias.length) * 200).toFixed(0);
            document.getElementById('ai-confidence').innerHTML = `<i class="fas fa-shield-alt"></i> Confianza IA: ${confianza}%`;

            let analisisFinal = "";
            const principal = Object.keys(pesos).reduce((a, b) => pesos[a] > pesos[b] ? a : b);

            if (principal === 'lecap') {
                analisisFinal = `**ESCENARIO DE TASAS:** El análisis de ${fuentes.length} fuentes confirma un dominio absoluto de instrumentos en pesos. Con la inflación cediendo, el mercado recomienda **MAXIMIZAR LECAPS**. El flujo informativo indica que el BCRA mantendrá la estabilidad, haciendo de la tasa el mejor refugio actual.`;
            } else if (principal === 'dolar') {
                analisisFinal = `**ESCENARIO DE COBERTURA:** Se detecta un ruido crítico en la brecha. La masa de noticias sugiere **DOLARIZACIÓN PREVENTIVA**. La recomendación es migrar a MEP o activos Hard Dollar ante señales de ajuste en el crawling-peg.`;
            } else if (principal === 'merval') {
                analisisFinal = `**ESCENARIO EQUITY:** Los diarios reportan una recuperación de activos locales. La IA sugiere **COMPRA DE ACCIONES**. El sector energía y bancos presentan un momento técnico superior a los instrumentos de renta fija.`;
            } else {
                analisisFinal = `**ESCENARIO SOBERANO:** Fuerte movimiento en bonos AL30/GD30. Se recomienda **ESTRATEGIA DE PARIDAD**. El riesgo país está en el centro de la agenda, favoreciendo la compresión de tasas de los bonos en dólares.`;
            }

            out.innerHTML = analisisFinal;
            document.getElementById('last-update').innerText = `SINCRO: ${new Date().toLocaleTimeString()}`;

            // 3. RENDERIZADO MINIATURA (PARA VER TODO DE UN VISTAZO)
            const agrupados = noticias.reduce((acc, n) => {
                if(!acc[n.fuente]) acc[n.fuente] = [];
                acc[n.fuente].push(n);
                return acc;
            }, {});

            const grid = document.getElementById('master-grid');
            grid.innerHTML = Object.keys(agrupados).map(f => `
                <div class="news-card">
                    <div class="card-header">${f.substring(0,25)}</div>
                    <div class="news-body">
                        ${agrupados[f].map(n => `<div class="item"><a href="${n.link}" target="_blank">${n.titulo}</a></div>`).join('')}
                    </div>
                </div>
            `).join('');

        } catch (e) {
            out.innerText = "Error en el análisis masivo de datos.";
        }
        btn.innerHTML = '<i class="fas fa-sync-alt"></i> RE-ESCANEAR TODAS LAS FUENTES';
    }

    analizarTodo();
    setInterval(analizarTodo, 300000); // Auto-refresco cada 5 min
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MC Centinela Financiero | Dashboard</title>
    <style>
        :root {
            --primary: #00ff88;
            --bg: #050505;
            --card: #111111;
            --text: #ffffff;
            --dim: #888888;
            --red: #ff3333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* HEADER */
        header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            flex-wrap: wrap;
            gap: 15px;
        }

        .h-left { display: flex; align-items: center; gap: 15px; }
        .logo img { height: 50px; width: auto; border-radius: 50%; transition: 0.3s; }
        .logo img:hover { transform: scale(1.1); filter: drop-shadow(0 0 8px var(--primary)); }
        
        .brand { display: flex; flex-direction: column; }
        .t-row { display: flex; align-items: center; gap: 8px; }
        .m-title { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .live { background: var(--red); color: white; font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: bold; animation: pulse 1.5s infinite; }
        .sub { font-size: 0.65rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

        .h-right { text-align: right; }
        .status { color: var(--primary); font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
        .dot { height: 8px; width: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); }
        .clock { font-size: 0.7rem; color: var(--dim); margin-top: 5px; font-family: monospace; }

        /* CONTENIDO */
        main { width: 100%; max-width: 800px; padding: 20px; }
        .card { 
            background: var(--card); 
            border-radius: 15px; 
            padding: 25px; 
            border-left: 4px solid var(--primary); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        @media (max-width: 600px) {
            header { justify-content: center; text-align: center; }
            .h-right { width: 100%; text-align: center; border-top: 1px solid #222; padding-top: 10px; }
            .status { justify-content: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="h-left">
            <a href="https://www.instagram.com/3d_mc_3d/" target="_blank" class="logo">
                <img src="https://avatars.githubusercontent.com/u/70527971?s=48&v=4" alt="Logo">
            </a>
            <div class="brand">
                <div class="t-row">
                    <span class="m-title">Centinela Financiero</span>
                    <span class="live">LIVE</span>
                </div>
                <span class="sub">Protocolo de Inteligencia de Mercado</span>
            </div>
        </div>
        <div class="h-right">
            <div class="status"><span class="dot"></span> ONLINE</div>
            <div id="time" class="clock">--:--:--</div>
        </div>
    </header>

    <main id="app-content">
        <div class="card">
            <h2 style="color:var(--primary); margin-bottom:15px; font-size: 1.4rem;">SISTEMA OPERATIVO</h2>
            <p style="color:#ccc; line-height:1.6;">El radar está activo. El sistema está configurado para visualizar alertas de Merval, Wall Street y Crypto con total compatibilidad en PC y celulares.</p>
        </div>
    </main>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('time').innerText = "ACTUALIZADO: " + now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

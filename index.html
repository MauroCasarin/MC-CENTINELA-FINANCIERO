<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centinela Pro - Terminal 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--bg2:#0f172a;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--border:#1e293b;--txt:#f1f5f9}
        body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;padding:12px}
        .monitor-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;border-top:3px solid var(--blue)}
        .label{font-size:0.65rem;font-weight:800;color:var(--blue);text-transform:uppercase;display:block;margin-bottom:5px}
        .value{font-size:1.7rem;font-weight:700;display:block}
        .ia-panel{background:linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);border:1px solid #4338ca;border-radius:16px;padding:18px;margin:15px 0}
        .badge-live{background:rgba(34,197,94,0.1);color:var(--green);border:1px solid var(--green);font-size:0.6rem;padding:2px 6px;border-radius:4px}
        table{font-size:0.85rem}.code{color:var(--blue);font-family:monospace;font-weight:bold}
    </style>
</head>
<body>

<div class="container-fluid" style="max-width:1100px">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h5 m-0 fw-bold"><i class="fas fa-microchip text-primary"></i> CENTINELA <span class="text-primary">PRO</span></h1>
            <span class="badge-live"><i class="fas fa-circle fa-xs"></i> DATOS REALES 2026</span>
        </div>
        <button class="btn btn-sm btn-dark border-secondary" onclick="refresh()"><i class="fas fa-sync"></i></button>
    </div>

    <div class="row g-2">
        <div class="col-6 col-md-3">
            <div class="monitor-card">
                <span class="label">Inflación (IPC)</span>
                <span class="value" id="ipc">--%</span>
                <small class="text-muted" id="ipc-date">Cargando...</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="monitor-card" style="border-top-color:var(--green)">
                <span class="label">Tasa PF (TNA)</span>
                <span class="value" id="tna">--%</span>
                <small class="text-muted" id="tem">TEM: --%</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="monitor-card">
                <span class="label">Dólar Blue</span>
                <span class="value" id="dolar">$--</span>
                <small class="text-muted">Venta Mercado</small>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="monitor-card">
                <span class="label">Spread Real</span>
                <span class="value" id="spread">--%</span>
                <small class="text-muted">Tasa vs IPC</small>
            </div>
        </div>
    </div>

    <div class="ia-panel">
        <h6 class="text-info fw-bold mb-2 small"><i class="fas fa-robot"></i> ESTRATEGIA RECOMENDADA</h6>
        <p id="ia-desc" class="m-0 small opacity-90">Sincronizando feed de datos para análisis...</p>
    </div>

    <div class="table-responsive bg-dark border border-secondary rounded-3">
        <table class="table table-dark table-hover mb-0">
            <thead>
                <tr class="text-muted" style="font-size:0.7rem">
                    <th>TICKER</th><th>VENCE</th><th>TEM EST.</th><th>VEREDICTO</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="4" class="text-center py-4 text-muted small">CONECTANDO AL MERCADO...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDM1NzQ3NjMsInR5cGUiOiJleHRlcm5hbCIsInVzZXIiOiJtdXJvY2FyaW5AaG90bWFpbC5jb20ifQ.sUg-29G9KKj-mSW2k3o3F-ovzdYlC6nzRtB1UKaLEeMQkNIhWEb9-jriFBQ8EbjSeumGcSI2OrsES8dxSOJS3Q";

async function refresh() {
    try {
        // 1. Dólar y Tasas (Ruta corregida /cotizaciones para evitar 404)
        const [dRes, tRes] = await Promise.all([
            fetch('https://dolarapi.com/v1/dolares/blue').then(r => r.json()),
            fetch('https://dolarapi.com/v1/cotizaciones').then(r => r.json())
        ]);

        // 2. BCRA Inflación con manejo de error SyntaxError
        const bcraUrl = "https://estadisticasbcra.com/api/inflacion_mensual_oficial";
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(bcraUrl);
        
        const iRaw = await fetch(proxy, { headers: { 'Authorization': 'BEARER ' + TOKEN } });
        const iJson = await iRaw.json();
        
        if(!iJson.contents) throw new Error("Respuesta vacía del proxy");
        const iData = JSON.parse(iJson.contents);
        const ultimoIpc = iData[iData.length - 1];

        // Procesamiento
        const pf = tRes.find(t => t.nombre.toLowerCase().includes('plazo fijo')) || {venta: 38};
        const tna = pf.venta;
        const tem = (Math.pow(1 + (tna/100/365), 30) - 1) * 100;
        const spread = (tem - ultimoIpc.v).toFixed(2);

        // UI Updates
        document.getElementById('ipc').textContent = ultimoIpc.v + '%';
        document.getElementById('ipc-date').textContent = "Dato: " + ultimoIpc.d;
        document.getElementById('tna').textContent = tna + '%';
        document.getElementById('tem').textContent = "TEM: " + tem.toFixed(2) + '%';
        document.getElementById('dolar').textContent = '$' + dRes.venta;
        
        const spEl = document.getElementById('spread');
        spEl.textContent = spread + '%';
        spEl.style.color = spread >= 0 ? 'var(--green)' : 'var(--red)';

        // IA Decision
        const iaDesc = document.getElementById('ia-desc');
        if(spread > 0.4) {
            iaDesc.innerHTML = "<b>CARRY TRADE ACTIVO:</b> La tasa real es positiva (" + spread + "%). Oportunidad en LECAPS 2026 para maximizar el interés compuesto frente al peso.";
        } else {
            iaDesc.innerHTML = "<b>COBERTURA CER:</b> La inflación presiona la tasa nominal. Se recomienda diversificar en bonos ajustables (TX26) para proteger el capital.";
        }

        renderTable(tem, ultimoIpc.v);

    } catch (e) {
        console.error("Falla detectada:", e);
        document.getElementById('ia-desc').innerHTML = "<span class='text-danger'>Error de feed. Verifique conexión o vigencia del TOKEN.</span>";
    }
}

function renderTable(tem, ipc) {
    const activos = [
        {c:'S27F6', n:'LECAP Feb 26', v:'27/02/26', t:'LECAP'},
        {c:'S16M6', n:'LECAP Mar 26', v:'16/03/26', t:'LECAP'},
        {c:'S17A6', n:'LECAP Abr 26', v:'17/04/26', t:'LECAP'},
        {c:'TX26',  n:'BONO CER 26',  v:'09/11/26', t:'CER'}
    ];

    document.getElementById('tbody').innerHTML = activos.map(a => {
        const tEst = a.t === 'LECAP' ? tem + 0.4 : ipc + 1.25;
        const veredicto = tEst > ipc ? 'ÓPTIMO' : 'NEUTRO';
        return `
            <tr>
                <td><span class="code">${a.c}</span><br><small class="text-muted">${a.n}</small></td>
                <td>${a.v}</td>
                <td class="text-success fw-bold">${tEst.toFixed(2)}%</td>
                <td><span class="badge ${tEst > ipc ? 'bg-success' : 'bg-secondary'}">${veredicto}</span></td>
            </tr>
        `;
    }).join('');
}

refresh();
setInterval(refresh, 300000);
</script>
</body>
</html>

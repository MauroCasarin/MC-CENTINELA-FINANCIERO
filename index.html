<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTINELA DEL MERCADO v15.9</title>
    <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/MauroCasarin/MC-CENTINELA-FINANCIERO/refs/heads/main/favicon.ico">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-overlay" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:9999; flex-direction:column; justify-content:center; align-items:center;">
        <div id="loader-sub" style="color: var(--blue); font-family: monospace; letter-spacing: 3px; font-weight: bold; margin-bottom: 20px;">INICIALIZANDO TERMINAL...</div>
        <div style="width: 200px; height: 2px; background: rgba(0,210,255,0.2); position: relative; overflow: hidden;">
            <div id="loader-bar" style="width: 100%; height: 100%; background: var(--blue); position: absolute; left: -100%; animation: loadMove 2s infinite;"></div>
        </div>
    </div>

    <div id="scan-line" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0, 210, 255, 0.5); box-shadow: 0 0 15px var(--blue); z-index: 9998; pointer-events: none; animation: scanMove 3s linear infinite;"></div>

    <style>
    @keyframes loadMove {
        0% { left: -100%; }
        100% { left: 100%; }
    }
    @keyframes scanMove {
        0% { top: 0%; }
        100% { top: 100%; }
    }
    </style>

    <div class="app-container">
        
        <div class="left-col">
            <div class="header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                <div style="font-weight: 900; letter-spacing: -1px; font-size: 1.2em;">
                    <span style="color: var(--blue)">CENTINELA</span> <span style="color: #fff">FINANCIERO</span>
                </div>
                <button class="update-btn" onclick="rescanearMercado()" style="padding: 8px 15px; border-radius: 4px; background: var(--blue); color: black; border: none; font-weight: bold; cursor: pointer;">
                    <i class="fa-solid fa-sync-alt"></i> REESCANEAR
                </button>
            </div>

            <div class="section-box" style="border-left: 4px solid var(--blue);">
                <div class="section-header">
                    <span><i class="fa-solid fa-microchip"></i> NÚCLEO DE INTELIGENCIA</span>
                    <span id="sentiment-display" style="font-size: 0.8em; opacity: 0.7;">ANALIZANDO...</span>
                </div>
                <div class="ia-terminal" style="padding: 20px;">
                    <div id="ai-text" style="font-size: 1.1em; line-height: 1.5; min-height: 100px;">Esperando datos...</div>
                </div>
                <div class="profile-selector" style="display: flex; gap: 10px; padding: 10px;">
                    <button class="profile-btn active" data-type="cons" onclick="switchProfile('cons')">CONSERVADOR</button>
                    <button class="profile-btn" data-type="mod" onclick="switchProfile('mod')">MODERADO</button>
                    <button class="profile-btn" data-type="agre" onclick="switchProfile('agre')">AGRESIVO</button>
                </div>
            </div>

            <div id="master-grid"></div>
        </div>

        <div class="right-col">
            <div class="section-box">
                <div class="section-header">MÉTRICAS CLAVE</div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border);">
                    <div class="data-card">
                        <span>INFLACIÓN (IPC)</span>
                        <b id="inflacion-val" style="color: var(--gold)">--%</b>
                    </div>
                    <div class="data-card">
                        <span>BRECHA</span>
                        <b id="brecha-val" style="color: var(--green)">--%</b>
                    </div>
                </div>
            </div>

            <div class="section-box">
                <div class="section-header">MONITOREO DE DIVISAS</div>
                <div id="dolar-container" class="data-grid"></div>
            </div>

            <div class="section-box">
                <div class="section-header">INSTRUMENTOS EN PESOS</div>
                <div id="pf-container"></div>
                <div id="rem-container" style="border-top: 1px solid var(--border);"></div>
            </div>

            <div class="section-box">
                <div class="section-header">OPORTUNIDADES Y RIESGO</div>
                <div id="lecap-container"></div>
            </div>
            
            <div style="text-align: center; margin-top: 15px; font-size: 0.7em; opacity: 0.4; letter-spacing: 2px;">
                CENTINELA TERMINAL v15.9.0
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="metrics.js"></script>
    <script src="monitoring.js"></script>
    <script src="intelligence.js"></script>
    <script src="news.js"></script>
</body>
</html>

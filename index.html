<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTINELA FINANCIERO v15.9</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader-overlay">
        <div id="loader-sub">SINCRONIZANDO TERMINAL...</div>
    </div>

    <div class="terminal-container">
        <div class="top-metrics-bar">
            <div class="metric-item"><span>BLUE</span><div id="dolar-blue-val" class="metric-value">--</div></div>
            <div class="metric-item"><span>MEP</span><div id="dolar-mep-val" class="metric-value">--</div></div>
            <div class="metric-item"><span>RIESGO</span><div id="riesgo-val" class="metric-value">--</div></div>
            <div class="metric-item"><span>IPC</span><div id="ipc-val" class="metric-value">--</div></div>
            <div class="metric-item"><span>BRECHA</span><div id="brecha-val" class="metric-value">--</div></div>
            <div class="metric-item"><span>MERVAL</span><div id="merval-val" class="metric-value">--</div></div>
        </div>

        <div class="grid-layout">
            <div class="section-box">
                <div class="section-header">INTELIGENCIA ESTRATÉGICA</div>
                <div class="profile-selector">
                    <button class="profile-btn active" data-type="cons">CONSERVADOR</button>
                    <button class="profile-btn" data-type="mod">MODERADO</button>
                    <button class="profile-btn" data-type="agr">AGRESIVO</button>
                </div>
                <div id="ai-strategy-text" class="strategy-display">Iniciando análisis...</div>
            </div>

            <div class="section-box">
                <div class="section-header">MONITOR DE TASAS (TNA)</div>
                <div id="rem-container"></div>
                <div id="pf-container"></div>
            </div>

            <div id="master-grid" style="grid-column: 1 / -1;"></div>
        </div>
    </div>

    <script src="main.js"></script>
    <script src="metrics.js"></script>
    <script src="monitoring.js"></script>
    <script src="news.js"></script>
    <script src="intelligence.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - INTELIGENCIA DE MERCADOS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--border:#1e293b;--gold:#fbbf24;--accent:#8b5cf6;--green:#10b981}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:15px; line-height:1.6}
        
        /* BOX DE ESTRATEGIA - CENTRO DE LA APP */
        .strategy-engine {
            background: linear-gradient(145deg, #0f172a, #131e35);
            border: 1px solid var(--border);
            border-left: 5px solid var(--accent);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .engine-header {
            color: var(--accent);
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .conclusion-box {
            font-size: 1.15rem;
            color: #e2e8f0;
            font-weight: 500;
            white-space: pre-line;
        }
        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-top: 15px;
        }

        /* GRILLA DE DIARIOS */
        .news-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:20px}
        .news-card{background:var(--card); border:1px solid var(--border); border-radius:12px; height:450px; display:flex; flex-direction:column}
        .card-header{padding:12px 15px; background:rgba(255,255,255,0.02); font-weight:800; font-size:0.75rem; color:var(--blue); border-bottom:1px solid var(--border)}
        .news-body{padding:10px; overflow-y:auto; flex-grow:1}
        .item{padding:12px; border-bottom:1px solid rgba(255,255,255,0.03); font-size:0.85rem}
        a{color:var(--txt); text-decoration:none; transition: 0.2s}
        a:hover{color:var(--blue)}
        
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-thumb{background:var(--border); border-radius:10px}
        @media (max-width: 600px) { .strategy-engine { padding: 15px; } .conclusion-box { font-size: 1rem; } }
    </style>
</head>
<body>

<div class="strategy-engine">
    <div class="engine-header"><i class="fas fa-brain"></i> Análisis de Conclusión Centinela</div>
    <div id="ai-verdict" class="conclusion-box">
        Sincronizando fuentes y procesando variables macroeconómicas...
    </div>
    <div id="update-pill" class="status-pill">PROCESANDO DATOS EN TIEMPO REAL</div>
</div>

<div id="main-grid" class="news-grid"></div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbwimyVoLDfgkhMsm5eTS5wBsp3sio_PhQaxcmXAq6GyDfxRHSQ29NvV2m9N22XjwD_gfQ/exec";

    async function processFinancialData() {
        try {
            const response = await fetch(GOOGLE_URL);
            const data = await response.json();
            
            // 1. ANÁLISIS DE TITULARES EN TIEMPO REAL
            const rawText = data.noticias.map(n => n.titulo.toLowerCase()).join(" ");
            let conclusion = "";
            let colorPill = "var(--green)";

            // Lógica de detección cruzada
            const find = (word) => rawText.includes(word);

            if (find("lecap") || find("licitación") || find("tesoro")) {
                conclusion = "🔹 **RECOMENDACIÓN: ESTRATEGIA DE TASA (LECAPS)**\nSe detecta un flujo informativo centrado en deuda en pesos y licitaciones del Tesoro. Con la inflación en niveles estables, el rendimiento de las LECAPS rinde por encima del crawling-peg. Es momento de mantener posiciones en Letras para maximizar el interés compuesto frente al dólar.";
            } 
            else if (find("brecha") || find("salto") || find("dólar") || find("tensión")) {
                conclusion = "🔸 **RECOMENDACIÓN: COBERTURA (DÓLAR / BONOS AL30)**\nLos titulares sugieren ruido cambiario o ampliación de brecha. Se recomienda refugio en Dólar MEP o Bonos Soberanos (AL30/GD30) para proteger el capital. Evitar Plazos Fijos si la volatilidad persiste.";
                colorPill = "var(--gold)";
            }
            else if (find("merval") || find("acciones") || find("cedear")) {
                conclusion = "🚀 **RECOMENDACIÓN: RENTA VARIABLE (ACCIONES)**\nEl sentimiento del mercado muestra optimismo en el sector privado. Considerar posicionarse en el Merval o Cedears de empresas tecnológicas. La tasa real podría estar perdiendo atractivo frente al crecimiento patrimonial.";
            }
            else {
                conclusion = "⚖️ **RECOMENDACIÓN: DIVERSIFICACIÓN PRUDENTE**\nSin una tendencia clara en los diarios, la mejor opción es el 50/50: Letras de corto plazo para liquidez inmediata y Dólar para cobertura de fondo.";
            }

            document.getElementById('ai-verdict').innerHTML = conclusion;
            document.getElementById('update-pill').style.color = colorPill;
            document.getElementById('update-pill').innerText = "ÚLTIMA CONCLUSIÓN: " + new Date().toLocaleTimeString();

            // 2. RENDERIZADO DE DIARIOS (Ocultando datos numéricos brutos)
            const grouped = data.noticias.reduce((acc, n) => {
                if(!acc[n.fuente]) acc[n.fuente] = [];
                acc[n.fuente].push(n);
                return acc;
            }, {});

            const grid = document.getElementById('main-grid');
            grid.innerHTML = Object.keys(grouped).map(diario => `
                <div class="news-card">
                    <div class="card-header">${diario.toUpperCase()}</div>
                    <div class="news-body">
                        ${grouped[diario].map(n => `
                            <div class="item">
                                <a href="${n.link}" target="_blank">${n.titulo}</a>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');

        } catch (e) {
            document.getElementById('ai-verdict').innerText = "Error de conexión con la terminal de datos.";
        }
    }

    processFinancialData();
    // Refresco cada 3 minutos para mantener la "Conclusión" fresca
    setInterval(processFinancialData, 180000); 
</script>

</body>
</html>

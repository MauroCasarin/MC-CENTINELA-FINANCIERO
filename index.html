<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA INTEL - TERMINAL FINANCIERA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--border:#1e293b;--green:#10b981}
        body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:10px}
        
        /* Panel de Indicadores (Inflación/Dólar) */
        .market-bar{display:grid;grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:15px}
        .stat-card{background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border);border-bottom:3px solid var(--blue);text-align:center}
        .stat-label{font-size:0.65rem;color:#64748b;text-transform:uppercase;display:block;margin-bottom:5px}
        .stat-value{font-size:1.1rem;font-weight:bold;color:var(--blue)}

        .header{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;border-left:5px solid var(--blue)}
        .header h1{font-size:0.9rem;margin:0;letter-spacing:1px;text-transform:uppercase}
        
        /* Grilla de Noticias */
        .news-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:15px}
        .news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:450px;overflow:hidden}
        .card-header{padding:12px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .source-badge{font-size:0.65rem;font-weight:bold;padding:4px 8px;border-radius:4px;text-transform:uppercase;background:var(--blue);color:#000}
        
        .news-body{padding:10px;overflow-y:auto;flex-grow:1}
        .news-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .news-link{color:var(--txt);text-decoration:none;font-size:0.85rem;line-height:1.4;display:block}
        .news-link:hover{color:var(--blue)}
        .news-time{font-size:0.6rem;color:var(--blue);display:block;margin-bottom:4px;font-weight:bold}

        .btn-refresh{background:var(--blue);border:none;padding:10px;border-radius:8px;cursor:pointer;color:#000}
        
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
        @media (max-width: 600px) { .news-grid{grid-template-columns: 1fr} }
    </style>
</head>
<body>

<div class="market-bar">
    <div class="stat-card">
        <span class="stat-label">IPC Est. (Indec)</span>
        <span class="stat-value" id="inf-dato">-- %</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">TNA Plazo Fijo</span>
        <span class="stat-value" id="pf-dato">-- %</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">Dólar Blue</span>
        <span class="stat-value" id="blue-dato">$ --</span>
    </div>
    <div class="stat-card" style="border-bottom-color:var(--green)">
        <span class="stat-label">Estado Red</span>
        <span class="stat-value" id="status-dato" style="color:var(--green); font-size:0.8rem">Sincronizando</span>
    </div>
</div>

<div class="header">
    <h1><i class="fas fa-microchip"></i> Centinela Intelligence v3.0</h1>
    <button class="btn-refresh" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="main-grid" class="news-grid">
    <div style="grid-column:1/-1; text-align:center; padding:100px; opacity:0.5">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>Consolidando economía y actualidad...
    </div>
</div>

<script>
    // URL DE TU SCRIPT DE GOOGLE CONFIRMADA POR CAPTURA image_07e931.png
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbzoJKlDUEYCffrTQmWDiLijzD-A5cq5_LVLeI6aqkuqmuiyhdpfMBF6IpFnCgisyHqzFQ/exec";

    async function fetchData() {
        const grid = document.getElementById('main-grid');
        const status = document.getElementById('status-dato');
        
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            // 1. Actualizar Indicadores
            document.getElementById('inf-dato').innerText = data.indicadores.inflacion;
            document.getElementById('pf-dato').innerText = data.indicadores.tna_pf;
            document.getElementById('blue-dato').innerText = data.indicadores.dolar_blue;
            status.innerText = "ONLINE";

            // 2. Agrupar Noticias por Fuente
            const grouped = data.noticias.reduce((acc, item) => {
                if (!acc[item.fuente]) acc[item.fuente] = [];
                acc[item.fuente].push(item);
                return acc;
            }, {});

            grid.innerHTML = '';
            
            // 3. Crear Tarjetas
            Object.keys(grouped).forEach(fuente => {
                let itemsHtml = grouped[fuente].map(n => {
                    let hora = n.fecha ? new Date(n.fecha).toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'}) + " HS" : "RECIENTE";
                    return `
                        <div class="news-item">
                            <span class="news-time">${hora}</span>
                            <a href="${n.link}" target="_blank" class="news-link">${n.titulo}</a>
                        </div>
                    `;
                }).join('');

                grid.innerHTML += `
                    <div class="news-card">
                        <div class="card-header">
                            <span class="source-badge">${fuente}</span>
                            <i class="fas fa-chart-bar" style="opacity:0.2"></i>
                        </div>
                        <div class="news-body">${itemsHtml}</div>
                    </div>
                `;
            });

        } catch (e) {
            status.innerText = "OFFLINE";
            status.style.color = "#ef4444";
        }
    }

    fetchData();
    setInterval(fetchData, 300000); // Actualiza cada 5 minutos
</script>

</body>
</html>

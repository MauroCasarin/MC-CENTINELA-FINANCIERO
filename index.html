<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Inversiones en Vivo - Argentina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            min-height: 100vh; /* Corrección CSS aplicada */
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .card {
            background-color: #121212;
            border: 1px solid #222;
            border-radius: 0.75rem;
        }
        .btn-primary {
            background-color: #007BFF;
            color: #fff;
            font-weight: 700;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 123, 255, 0.2);
        }
        .btn-primary:disabled {
            background-color: #333;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        .data-unavailable { color: #888; font-style: italic; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div id="app-container" class="w-full max-w-4xl mx-auto">

        <div id="main-view">
            <div class="text-center mb-8">
                <i data-lucide="bar-chart-horizontal-big" class="w-16 h-16 mx-auto text-[#007BFF]"></i>
                <h1 class="text-3xl font-extrabold tracking-tight mt-4">Analizador de Inversiones en Vivo</h1>
                <p class="text-gray-400">Datos reales para decisiones inteligentes.</p>
            </div>

            <div id="loading-state" class="text-center my-10 hidden">
                <div class="w-10 h-10 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mx-auto"></div>
                <p class="text-sm font-mono uppercase tracking-widest text-gray-500 mt-4">Capturando datos de mercado...</p>
            </div>

            <div id="results-container" class="space-y-6 hidden">
                <div id="data-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <!-- Data will be injected here -->
                </div>
                <div id="comparison-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Comparison cards will be injected here -->
                </div>
                <div class="text-center">
                     <button id="conviene-btn" disabled class="btn-primary px-10 py-4 rounded-full text-lg">¿Qué Conviene Hoy?</button>
                </div>
            </div>
        </div>

        <div id="offline-state" class="hidden text-center card p-8 bg-gray-800/50">
            <i data-lucide="wifi-off" class="w-12 h-12 mx-auto text-gray-500 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-300">Sin Conexión a Datos Reales</h2>
            <p class="text-gray-400 mt-2">Por favor, verifica tu conexión a internet para continuar.</p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            const mainView = document.getElementById('main-view');
            const loadingState = document.getElementById('loading-state');
            const resultsContainer = document.getElementById('results-container');
            const dataGrid = document.getElementById('data-grid');
            const comparisonGrid = document.getElementById('comparison-grid');
            const convieneBtn = document.getElementById('conviene-btn');
            const offlineState = document.getElementById('offline-state');

            const LECAP_TICKER = 'S31M6.BA'; // Lecap que vence el 31 de Marzo de 2026
            const VALOR_NOMINAL_LECAP = 100;

            const fetchWithProxy = async (url) => {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Proxy fetch failed');
                const data = await response.json();
                return JSON.parse(data.contents);
            };

            const fetchData = async () => {
                if (!navigator.onLine) {
                    mainView.classList.add('hidden');
                    offlineState.classList.remove('hidden');
                    return;
                }

                loadingState.classList.remove('hidden');
                resultsContainer.classList.add('hidden');

                const dolarPromise = fetch('https://dolarapi.com/v1/dolares').then(res => res.json());
                const lecapPromise = fetchWithProxy(`https://query1.finance.yahoo.com/v8/finance/chart/${LECAP_TICKER}`);
                const ipcPromise = fetch('https://apis.datos.gob.ar/series/api/series?ids=148.3_INIVELNAL_DICI_M_26&limit=1&sort=desc').then(res => res.json());

                const results = await Promise.allSettled([dolarPromise, lecapPromise, ipcPromise]);
                
                const [dolarResult, lecapResult, ipcResult] = results;

                const data = {};

                // Procesar Dólar y Tasas
                if (dolarResult.status === 'fulfilled') {
                    const d = dolarResult.value;
                    data.mep = d.find(c => c.casa === 'bolsa')?.venta;
                    data.ccl = d.find(c => c.casa === 'contadoconliqui')?.venta;
                    data.bna = d.find(c => c.casa === 'oficial')?.venta;
                    // dolarapi.com no tiene tasa de PF, se asume que se busca de otra fuente si estuviera disponible.
                    // Por ahora, se mantiene como no disponible si no está en la API principal.
                    data.tnaPf = 30.0; // Tasa de referencia, ya que la API no la provee.
                } else {
                    console.error('Error DolarAPI:', dolarResult.reason);
                }

                // Procesar Lecap
                if (lecapResult.status === 'fulfilled') {
                    data.lecapPrice = lecapResult.value.chart.result[0].meta.regularMarketPrice;
                } else {
                     console.error('Error Yahoo Finance:', lecapResult.reason);
                }

                // Procesar Inflación
                if (ipcResult.status === 'fulfilled') {
                    data.ipc = ipcResult.value.data[0][1];
                } else {
                    console.error('Error IPC API:', ipcResult.reason);
                }

                loadingState.classList.add('hidden');
                renderData(data);
                resultsContainer.classList.remove('hidden');
            };

            const renderData = (data) => {
                // Render top data grid
                dataGrid.innerHTML = `
                    ${createDataCard('Dólar MEP', data.mep, 'currency')}
                    ${createDataCard('Dólar CCL', data.ccl, 'currency')}
                    ${createDataCard('Dólar BNA', data.bna, 'currency')}
                    ${createDataCard('Inflación IPC', data.ipc, 'percent')}
                `;

                // Calcular y renderizar comparaciones
                const temPf = data.tnaPf ? (data.tnaPf / 12) : null;
                
                let temLecap = null;
                if (data.lecapPrice) {
                    const diasAlVto = calculateDaysToMaturity('S31M6');
                    if (diasAlVto > 0) {
                        temLecap = (Math.pow(VALOR_NOMINAL_LECAP / data.lecapPrice, 30 / diasAlVto) - 1) * 100;
                    }
                }

                comparisonGrid.innerHTML = `
                    ${createComparisonCard('Plazo Fijo', temPf, data.ipc)}
                    ${createComparisonCard('LECAP ' + LECAP_TICKER.split('.')[0], temLecap, data.ipc)}
                `;

                if (temPf !== null && temLecap !== null && data.ipc !== null) {
                    convieneBtn.disabled = false;
                    convieneBtn.onclick = () => {
                        const realPf = temPf - data.ipc;
                        const realLecap = temLecap - data.ipc;
                        const winner = realLecap > realPf ? 'LECAP' : 'Plazo Fijo';
                        alert(`Análisis Rápido: Con una tasa real de ${Math.max(realLecap, realPf).toFixed(2)}%, hoy conviene invertir en ${winner}.`);
                    };
                }
                lucide.createIcons();
            };

            const createDataCard = (label, value, type) => {
                const formattedValue = value
                    ? (type === 'currency' ? `$${value.toFixed(2)}` : `${value.toFixed(2)}%`)
                    : '<span class="data-unavailable">No disponible</span>';
                return `
                    <div class="card p-4 text-center">
                        <h3 class="text-sm font-semibold text-gray-400">${label}</h3>
                        <p class="text-2xl font-mono font-bold">${formattedValue}</p>
                    </div>`;
            };

            const createComparisonCard = (label, tem, ipc) => {
                let content;
                if (tem !== null && ipc !== null) {
                    const tasaReal = tem - ipc;
                    const color = tasaReal >= 0 ? 'text-green-400' : 'text-red-400';
                    content = `
                        <p class="font-bold font-mono text-3xl ${color}">${tasaReal.toFixed(2)}%</p>
                        <p class="text-xs text-gray-400">Tasa Real Mensual</p>
                        <p class="text-xs font-mono text-gray-500 mt-2">TEM: ${tem.toFixed(2)}% | IPC: ${ipc.toFixed(2)}%</p>
                    `;
                } else {
                    content = `<p class="text-lg font-mono data-unavailable">Datos insuficientes</p>`;
                }
                return `<div class="card p-6 text-center"><h3 class="font-bold text-lg mb-2">${label}</h3>${content}</div>`;
            };

            const calculateDaysToMaturity = (ticker) => {
                const monthMap = { 'E':0, 'F':1, 'M':2, 'A':3, 'Y':4, 'J':5, 'L':6, 'G':7, 'S':8, 'O':9, 'N':10, 'D':11 };
                const day = parseInt(ticker.substring(1, 3));
                const month = monthMap[ticker.substring(3, 4)];
                const year = 2020 + parseInt(ticker.substring(4, 5));
                
                const today = new Date('2026-02-25T12:00:00Z'); // Fecha fija según requerimiento
                const maturityDate = new Date(Date.UTC(year, month, day, 12, 0, 0));
                
                const diffTime = maturityDate - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            fetchData();
        });
    </script>
</body>
</html>

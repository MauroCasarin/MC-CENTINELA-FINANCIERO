<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA PRO - FINAL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--bg2:#0f172a;--blue:#38bdf8;--green:#22c55e;--red:#ef4444;--border:#1e293b;--txt:#f1f5f9}
        body{background:var(--bg);color:var(--txt);font-family:sans-serif;padding:15px;font-size:14px}
        .card-live{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:10px;border-top:3px solid var(--blue)}
        .label{font-size:0.7rem;color:var(--blue);text-transform:uppercase;font-weight:bold;display:block}
        .value{font-size:1.6rem;font-weight:bold;display:block;margin:5px 0}
        .ia-panel{background:linear-gradient(135deg,#0f172a,#1e1b4b);border:1px solid #4338ca;border-radius:12px;padding:15px;margin:15px 0}
        .status-dot{width:8px;height:8px;background:var(--green);border-radius:50%;display:inline-block;margin-right:5px;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
        th{color:var(--blue);text-transform:uppercase;font-size:0.65rem}
        .badge-buy{background:rgba(34,197,94,0.2);color:var(--green);border:1px solid var(--green);padding:4px 8px;border-radius:6px;font-weight:bold}
    </style>
</head>
<body>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h6 class="m-0 fw-bold"><i class="fas fa-microchip text-primary"></i> CENTINELA <span class="text-primary">PRO</span></h6>
            <small class="text-muted"><span class="status-dot"></span> SISTEMA VIVO 2026</small>
        </div>
        <button class="btn btn-sm btn-dark border-secondary" onclick="refresh()">ACTUALIZAR</button>
    </div>

    <div class="row g-2">
        <div class="col-6"><div class="card-live"><span class="label">IPC BCRA</span><span class="value" id="ipc">--%</span></div></div>
        <div class="col-6"><div class="card-live" style="border-top-color:var(--green)"><span class="label">TNA PF</span><span class="value" id="tna">--%</span></div></div>
        <div class="col-6"><div class="card-live"><span class="label">DÓLAR</span><span class="value" id="dolar">$--</span></div></div>
        <div class="col-6"><div class="card-live"><span class="label">SPREAD</span><span class="value" id="spread">--%</span></div></div>
    </div>

    <div class="ia-panel">
        <h6 class="text-info fw-bold small"><i class="fas fa-robot"></i> ESTRATEGIA RECOMENDADA</h6>
        <p id="ia-desc" class="m-0 small opacity-75">Sincronizando fuentes...</p>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-hover border border-secondary">
            <thead><tr><th>TICKER</th><th>VENCE</th><th>TEM</th><th>ESTADO</th></tr></thead>
            <tbody id="tbody"><tr><td colspan="4" class="text-center py-4">Obteniendo datos...</td></tr></tbody>
        </table>
    </div>
</div>

<script>
const TOKEN = "eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDM1NzQ3NjMsInR5cGUiOiJleHRlcm5hbCIsInVzZXIiOiJtdXJvY2FyaW5AaG90bWFpbC5jb20ifQ.sUg-29G9KKj-mSW2k3o3F-ovzdYlC6nzRtB1UKaLEeMQkNIhWEb9-jriFBQ8EbjSeumGcSI2OrsES8dxSOJS3Q";

async function refresh() {
    try {
        // CORRECCIÓN: Usamos una sola ruta de DolarAPI para evitar el 404 de /tasas
        const dRes = await fetch('https://dolarapi.com/v1/dolares/blue').then(r => r.json());
        const tRes = await fetch('https://dolarapi.com/v1/cotizaciones').then(r => r.json());

        // CORRECCIÓN: Manejo de error de JSON para el BCRA
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent("https://estadisticasbcra.com/api/inflacion_mensual_oficial");
        const iRaw = await fetch(proxy, { headers: { 'Authorization': 'BEARER ' + TOKEN } });
        const iJson = await iRaw.json();
        
        if (!iJson.contents) throw new Error("Respuesta vacía");
        const iData = JSON.parse(iJson.contents);
        const ultimoIpc = iData[iData.length - 1].v;

        const pf = tRes.find(t => t.nombre.toLowerCase().includes('plazo fijo')) || {venta: 37};
        const tem = (Math.pow(1 + (pf.venta/100/365), 30) - 1) * 100;
        const spread = (tem - ultimoIpc).toFixed(2);

        // Actualizar Pantalla
        document.getElementById('ipc').textContent = ultimoIpc + '%';
        document.getElementById('tna').textContent = pf.venta + '%';
        document.getElementById('dolar').textContent = '$' + dRes.venta;
        document.getElementById('spread').textContent = spread + '%';
        document.getElementById('spread').style.color = spread >= 0 ? 'var(--green)' : 'var(--red)';

        document.getElementById('ia-desc').innerHTML = spread > 0.3 
            ? "<b>OPORTUNIDAD:</b> Tasa real positiva. Se recomienda posicionar en <b>LECAPS 2026</b>." 
            : "<b>ALERTA:</b> Inflación elevada. Sugerido migrar a <b>Bonos CER (TX26)</b>.";

        renderTable(tem, ultimoIpc);
    } catch (e) {
        console.error("Falla:", e);
        document.getElementById('ia-desc').innerHTML = "<span class='text-danger'>Error de Feed. Reintentando...</span>";
    }
}

function renderTable(tem, ipc) {
    // LECAPS Actualizadas para 2026
    const activos = [
        {c:'S27F6', n:'LECAP Feb 26', v:'27/02/26'},
        {c:'S31M6', n:'LECAP Mar 26', v:'31/03/26'},
        {c:'TX26',  n:'BONO CER 26',  v:'09/11/26'}
    ];
    document.getElementById('tbody').innerHTML = activos.map(a => `
        <tr>
            <td><b class="text-primary">${a.c}</b></td>
            <td>${a.v}</td>
            <td class="text-success">${(a.c.includes('TX') ? ipc + 1.15 : tem + 0.45).toFixed(2)}%</td>
            <td><span class="badge-buy">${tem > ipc ? 'COMPRAR' : 'CER'}</span></td>
        </tr>
    `).join('');
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>

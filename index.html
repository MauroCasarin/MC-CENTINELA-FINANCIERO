<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centinela Pro - Fix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#0a0e17;--bg2:#111827;--bg3:#1f2937;--txt:#e5e7eb;--txt2:#9ca3af;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6;--border:#374151}
        body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;padding:10px;min-height:100vh}
        .container{max-width:1200px}
        .header{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:15px;border-left:5px solid var(--blue)}
        .card-stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:15px;height:100%}
        .label{color:var(--txt2);font-size:0.7rem;text-transform:uppercase;font-weight:bold;display:block;margin-bottom:5px}
        .value{font-size:1.6rem;font-weight:bold;color:white}
        .sub{font-size:0.75rem;color:var(--txt2)}
        .ia-box{background:rgba(59,130,246,0.1);border:1px solid var(--blue);border-radius:12px;padding:15px;margin-bottom:15px}
        .status-badge{font-size:0.65rem;padding:3px 8px;border-radius:10px}
        @media(max-width:768px){.value{font-size:1.4rem}}
    </style>
</head>
<body>

<div class="container">
    <div class="header d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h5 m-0" style="color:var(--blue);font-weight:800">CENTINELA PRO</h1>
            <small id="status-api" style="color:var(--txt2);font-size:0.6rem">Sincronizando fuentes...</small>
        </div>
        <button class="btn btn-sm btn-primary" onclick="refresh()"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-6 col-md-3">
            <div class="card-stat">
                <span class="label">Inflación (BCRA)</span>
                <span class="value" id="ipc">--%</span>
                <span class="sub" id="ipc-date">Cargando...</span>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-stat">
                <span class="label">Tasa Plazo Fijo</span>
                <span class="value" id="tna">--%</span>
                <span class="sub" id="tem">TEM: --%</span>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-stat">
                <span class="label">Dólar Blue</span>
                <span class="value" id="dolar">$--</span>
                <span class="sub">Venta Mercado</span>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card-stat">
                <span class="label">Spread Real</span>
                <span class="value" id="spread">--%</span>
                <span class="sub">Tasa vs IPC</span>
            </div>
        </div>
    </div>

    <div class="ia-box">
        <div class="d-flex justify-content-between align-items-start">
            <div>
                <h6 style="color:var(--blue);font-size:0.8rem"><i class="fas fa-robot"></i> ESTRATEGIA</h6>
                <p id="ia-desc" class="small m-0">Iniciando algoritmo de análisis...</p>
            </div>
            <span id="ia-badge" class="badge bg-secondary status-badge">ESPERANDO</span>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-sm border-secondary" style="font-size:0.85rem">
            <thead>
                <tr><th>Activo</th><th>Vence</th><th>TEM</th><th>Acción</th></tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="4" class="text-center py-4">Sincronizando con mercado...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
const BCRA_TOKEN = "eyJhbGciOiJIUzUxMiIsInR5cCI6IkpXVCJ9.eyJleHAiOjE4MDM1NzQ3NjMsInR5cGUiOiJleHRlcm5hbCIsInVzZXIiOiJtdXJvY2FyaW5AaG90bWFpbC5jb20ifQ.sUg-29G9KKj-mSW2k3o3F-ovzdYlC6nzRtB1UKaLEeMQkNIhWEb9-jriFBQ8EbjSeumGcSI2OrsES8dxSOJS3Q";

async function refresh() {
    document.getElementById('status-api').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conectando...';
    
    let ipcVal = 3.5; // Respaldo (Enero/Febrero est.)
    let ipcDate = "Dato estimado (Fallback)";

    try {
        // Intento de obtener Inflación (Si falla CORS, el catch maneja el error y usa el respaldo)
        const respIpc = await fetch(`https://estadisticasbcra.com/api/inflacion_mensual_oficial?token=${BCRA_TOKEN}`);
        if(respIpc.ok) {
            const dataIpc = await respIpc.json();
            const ultimo = dataIpc[dataIpc.length - 1];
            ipcVal = ultimo.v;
            ipcDate = "Mes: " + ultimo.d;
        }
    } catch (e) {
        console.warn("Bloqueo CORS en BCRA. Usando estimación.");
    }

    try {
        // Dólar y Tasas (DolarAPI suele tener CORS abierto para todos)
        const [resDolar, resTasas] = await Promise.all([
            fetch('https://dolarapi.com/v1/dolares/blue').then(r => r.json()),
            fetch('https://dolarapi.com/v1/cotizaciones/tasas').then(r => r.json())
        ]);

        const pf = resTasas.find(t => t.casa === 'plazo_fijo');
        const tna = pf ? pf.venta : 38;
        const tem = (Math.pow(1 + (tna/100/365), 30) - 1) * 100;
        const spread = (tem - ipcVal).toFixed(2);

        // Actualizar Interfaz
        document.getElementById('ipc').textContent = ipcVal + '%';
        document.getElementById('ipc-date').textContent = ipcDate;
        document.getElementById('tna').textContent = tna + '%';
        document.getElementById('tem').textContent = "TEM: " + tem.toFixed(2) + '%';
        document.getElementById('dolar').textContent = '$' + resDolar.venta;
        
        const spEl = document.getElementById('spread');
        spEl.textContent = spread + '%';
        spEl.style.color = spread >= 0 ? 'var(--green)' : 'var(--red)';

        // IA Logic
        const iaBadge = document.getElementById('ia-badge');
        const iaDesc = document.getElementById('ia-desc');
        if(spread > 0) {
            iaBadge.textContent = "CARRY TRADE";
            iaBadge.className = "badge bg-success status-badge";
            iaDesc.textContent = "Tasas reales positivas. El peso rinde más que la inflación. Sugerido: LECAPS.";
        } else {
            iaBadge.textContent = "COBERTURA";
            iaBadge.className = "badge bg-danger status-badge";
            iaDesc.textContent = "Inflación supera a la tasa. Buscar protección en activos CER o Dólar.";
        }

        renderTable(tem, ipcVal);
        document.getElementById('status-api').innerHTML = '<i class="fas fa-check-circle text-success"></i> Datos actualizados';

    } catch (e) {
        document.getElementById('status-api').innerHTML = '<i class="fas fa-exclamation-triangle text-danger"></i> Error de conexión';
    }
}

function renderTable(tem, ipc) {
    const assets = [
        {n: 'LECAP S14A5', v: '14/04/25', t: tem + 0.5},
        {n: 'Bono CER TX26', v: '09/11/26', t: ipc + 1.1},
        {n: 'Plazo Fijo', v: '30 días', t: tem}
    ];
    document.getElementById('tbody').innerHTML = assets.map(a => `
        <tr>
            <td><b style="color:var(--blue)">${a.n}</b></td>
            <td>${a.v}</td>
            <td style="color:var(--green)">${a.t.toFixed(2)}%</td>
            <td><span class="badge ${a.t > ipc ? 'bg-success' : 'bg-secondary'}" style="font-size:0.6rem">
                ${a.t > ipc ? 'OPTIMO' : 'NEUTRO'}</span></td>
        </tr>
    `).join('');
}

refresh();
</script>
</body>
</html>

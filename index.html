<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA NANO-IA v5.5 - ESTRATEGA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--accent:#8b5cf6;--border:#1e293b;--gold:#fbbf24;--green:#10b981;--orange:#fb923c;--red:#ff4444;--yellow:#fbbf24}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:4px; font-size: 8px; overflow-x:hidden}
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 8px; background: #0f172a; border-radius: 4px; border: 1px solid var(--border); margin-bottom: 4px; }
        .logo { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--blue); cursor: pointer; transition: transform 0.2s; }

        .ai-terminal {
            background: linear-gradient(145deg, #0f172a, #131e35);
            border: 1px solid var(--border); border-top: 2px solid var(--accent);
            border-radius: 4px; padding: 6px; margin-bottom: 4px;
        }

        /* Ventana de Análisis Estratégico */
        .ai-brain-window {
            background: rgba(139, 92, 246, 0.05);
            border: 1px solid var(--accent);
            border-radius: 4px; padding: 8px; margin: 6px 0;
            position: relative; overflow: hidden;
        }
        .ai-brain-window::before {
            content: "ESTRATEGIA IA EN TIEMPO REAL";
            position: absolute; top: 0; right: 0; background: var(--accent);
            color: white; font-size: 5px; padding: 1px 4px; font-weight: 900;
        }
        .ai-verdict-text { font-size: 0.7rem; line-height: 1.3; color: var(--txt); }
        .ai-verdict-text b { color: var(--gold); }
        .pulse { animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .section-label { font-size: 0.45rem; color: #64748b; font-weight: 800; text-transform: uppercase; margin: 3px 0 1px 0; display: block; letter-spacing: 0.3px; }
        .nano-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 3px; }
        .badge { background: rgba(255,255,255,0.02); border: 1px solid var(--border); padding: 1px 3px; border-radius: 2px; display: flex; align-items: center; gap: 2px; }
        .b-val { font-weight: 700; font-size: 0.55rem; }
        
        .up { color: var(--green) !important; }
        .mid { color: var(--yellow) !important; }
        .down { color: var(--red) !important; }
        .neutral { color: var(--blue); }

        .update-btn { background: var(--accent); color: white; border: none; padding: 4px 10px; border-radius: 2px; font-weight: bold; cursor: pointer; font-size: 0.6rem; width: 100%; margin-top: 4px;}

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 2px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; height: 100px; display: flex; flex-direction: column; }
        .card-h { padding: 2px 5px; background: rgba(255,255,255,0.04); font-size: 0.45rem; font-weight: 900; color: var(--blue); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .card-b { padding: 2px 4px; overflow-y: auto; flex-grow: 1; scrollbar-width: none; }
        .news-item a { color: #94a3b8; text-decoration: none; font-size: 0.55rem; display: block; line-height: 1; margin-bottom: 2px; }

        @media (max-width: 600px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:4px;">
        <a href="https://www.instagram.com/3d_mc_3d/" target="_blank">
            <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" class="logo">
        </a>
        <span style="font-weight:900; color:var(--blue);">CENTINELA AI v5.5</span>
    </div>
    <div id="t-stamp" style="color:var(--green); font-size:0.45rem;">--:--:--</div>
</div>

<div class="ai-terminal">
    <div class="ai-brain-window">
        <div id="ai-verdict" class="ai-verdict-text pulse">Iniciando redes neuronales de análisis...</div>
    </div>

    <span class="section-label">Mercado de Tasas (Mensual vs IPC)</span>
    <div id="rem-container" class="nano-grid"></div>
    <div id="pf-container" class="nano-grid"></div>
    <div id="lecap-container" class="nano-grid"></div>

    <span class="section-label">Dólar y Brecha</span>
    <div id="dolar-container" class="nano-grid"></div>

    <button class="update-btn" onclick="generarAnalisisReal()">SINCRONIZAR Y ANALIZAR</button>
</div>

<div id="master-grid" class="grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares";
    const INFLACION_API = "https://api.argentinadatos.com/v1/finanzas/indices/inflacion";
    const TASA_REF_API = "https://api.argentinadatos.com/v1/finanzas/tasas/plazoFijo";
    
    const remData = [
        {f: "BELO", t: 0.245}, {f: "BNA", t: 0.22}, {f: "BRUBANK", t: 0.27}, {f: "C4", t: 0.32},
        {f: "FIWIND", t: 0.32}, {f: "MONTEMAR", t: 0.25}, {f: "NX", t: 0.25}, {f: "SUP.", t: 0.205},
        {f: "Ualá", t: 0.23}, {f: "U. P1", t: 0.26}, {f: "U. P2", t: 0.29}
    ];

    const pfData = [
        {e: "Nación", t: 0.25}, {e: "Sant.", t: 0.23}, {e: "Galicia", t: 0.23}, {e: "Prov.", t: 0.25},
        {e: "BBVA", t: 0.24}, {e: "Macro", t: 0.28}, {e: "Reba", t: 0.34}, {e: "Bica", t: 0.33}
    ];

    function getColor(valor, ipc) {
        if (valor >= ipc) return 'up';
        if (ipc - valor <= 0.5) return 'mid';
        return 'down';
    }

    async function generarAnalisisReal() {
        const vBox = document.getElementById('ai-verdict');
        vBox.classList.add('pulse');
        vBox.innerHTML = "Analizando tendencias, noticias y tasas...";

        try {
            const [resNews, resDolar, resInf, resTasa] = await Promise.all([
                fetch(NEWS_URL).then(r => r.json()),
                fetch(DOLAR_URL).then(r => r.json()),
                fetch(INFLACION_API).then(r => r.json()),
                fetch(TASA_REF_API).then(r => r.json())
            ]);

            const noticias = resNews.noticias || [];
            const dolares = resDolar || [];
            const ipcVal = resInf[resInf.length - 1].valor;
            const tnaRef = (resTasa[resTasa.length - 1].valor || resTasa[resTasa.length - 1].tna * 100);
            const rRefMensual = tnaRef / 12;

            // RENDER DATA
            document.getElementById('rem-container').innerHTML = remData.sort((a,b)=>b.t-a.t).map(r => {
                const m = (r.t*100)/12;
                return `<div class="badge"><span class="b-name">${r.f}</span><span class="b-val ${getColor(m, ipcVal)}">${m.toFixed(2)}%</span></div>`;
            }).join('');

            document.getElementById('pf-container').innerHTML = pfData.sort((a,b)=>b.t-a.t).map(p => {
                const m = (p.t*100)/12;
                return `<div class="badge"><span class="b-name">${p.e}</span><span class="b-val ${getColor(m, ipcVal)}">${m.toFixed(2)}%</span></div>`;
            }).join('');

            document.getElementById('lecap-container').innerHTML = `
                <div class="badge"><span class="b-name">EST. LECAP</span><span class="b-val ${getColor(rRefMensual+0.3, ipcVal)}">${(rRefMensual+0.3).toFixed(2)}%</span></div>
            `;

            document.getElementById('dolar-container').innerHTML = dolares.slice(0,4).map(d => `
                <div class="badge"><span class="b-name">${d.nombre.substring(0,6)}</span><span class="b-val neutral">$${Math.round(d.venta)}</span></div>
            `).join('');

            // --- LÓGICA DE INTELIGENCIA ARTIFICIAL (ANÁLISIS DE DATOS REALES) ---
            
            // 1. Análisis de Sentimiento de Noticias
            const keywords = {
                positivo: ['baja', 'cae', 'desciende', 'estabilidad', 'compra', 'superávit', 'calma'],
                negativo: ['sube', 'salto', 'tensión', 'riesgo', 'deuda', 'crisis', 'cepo', 'inflación'],
                dolar: ['dólar', 'blue', 'ccl', 'brecha', 'paralelo']
            };

            let scoreSentimiento = 0;
            let mencionesDolar = 0;
            const titulares = noticias.map(n => n.titulo.toLowerCase()).join(' ');

            keywords.positivo.forEach(w => { if(titulares.includes(w)) scoreSentimiento++ });
            keywords.negativo.forEach(w => { if(titulares.includes(w)) scoreSentimiento-- });
            keywords.dolar.forEach(w => { if(titulares.includes(w)) mencionesDolar++ });

            // 2. Análisis de Tasas vs Inflación
            const mejorTasa = Math.max(...remData.map(r => (r.t*100)/12), ...pfData.map(p => (p.t*100)/12));
            const pierdeContraIPC = mejorTasa < ipcVal;

            // 3. Veredicto Final Basado en Variables
            let recomendacion = "";
            let riesgo = scoreSentimiento < 0 ? "ALTO" : "MODERADO";

            if (pierdeContraIPC) {
                if (mencionesDolar > 5 || scoreSentimiento < -2) {
                    recomendacion = "El mercado está tenso. Con tasas perdiendo ante el IPC del **" + ipcVal + "%**, la IA sugiere **COBERTURA EN DÓLAR** o instrumentos vinculados a inflación (CER).";
                } else {
                    recomendacion = "Tasas negativas. El rinde óptimo de **" + mejorTasa.toFixed(2) + "%** no alcanza. Buscar Lecaps o billeteras de alto rinde para mitigar, pero el riesgo de licuación es real.";
                }
            } else {
                recomendacion = "¡Oportunidad de Carry! Las tasas (**" + mejorTasa.toFixed(2) + "%**) superan al IPC. El flujo de noticias indica " + (scoreSentimiento > 0 ? "estabilidad" : "volatilidad") + ". Mantenerse en pesos de alto rinde (Billeteras TOP).";
            }

            // Actualizar Ventana de Estrategia
            vBox.classList.remove('pulse');
            vBox.innerHTML = `
                <b>VERDICTO:</b> ${recomendacion}<br>
                <b>ESTADO DEL CLIMA:</b> Sentiment Score: ${scoreSentimiento} | Riesgo Político-Económico: ${riesgo}.<br>
                <b>ACCIÓN SUGERIDA:</b> ${(mejorTasa > ipcVal) ? "Aprovechar Tasa Verde" : "Mover a Cobertura / Dólar"}.
            `;

            // Render Grilla de noticias
            const agrupados = noticias.reduce((acc, n) => {
                if(!acc[n.fuente]) acc[n.fuente] = [];
                acc[n.fuente].push(n);
                return acc;
            }, {});
            document.getElementById('master-grid').innerHTML = Object.keys(agrupados).map(f => `
                <div class="card"><div class="card-h">${f}</div><div class="card-b">${agrupados[f].map(n => `<div class="news-item"><a href="${n.link}" target="_blank">${n.titulo}</a></div>`).join('')}</div></div>
            `).join('');

            document.getElementById('t-stamp').innerText = new Date().toLocaleTimeString();

        } catch (e) { vBox.innerHTML = "Error en el procesamiento de la IA."; }
    }
    document.addEventListener('DOMContentLoaded', generarAnalisisReal);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA IA - NARRATIVA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#020617;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--accent:#8b5cf6;--border:#1e293b;--gold:#fbbf24}
        body{background:var(--bg); color:var(--txt); font-family: 'Inter', sans-serif; margin:0; padding:10px; font-size: 12px; line-height: 1.4;}
        
        .header { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #0f172a; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; }
        .logo { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--blue); }

        .ai-terminal {
            background: linear-gradient(145deg, #0f172a, #131e35);
            border: 1px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .ai-stats { display: flex; flex-wrap: wrap; gap: 15px; font-size: 0.7rem; color: var(--blue); font-weight: bold; margin-bottom: 12px; align-items: center; }
        
        .dolar-badge { background: rgba(56, 189, 248, 0.15); border: 1px solid var(--blue); padding: 4px 10px; border-radius: 4px; color: var(--blue); font-size: 0.8rem; }

        .verdict-box { 
            font-size: 1.1rem; color: #f1f5f9; border-left: 4px solid var(--accent); 
            padding-left: 15px; font-weight: 300; min-height: 50px;
        }
        .verdict-box b { color: var(--gold); font-weight: 700; }

        .update-btn { background: var(--accent); color: white; border: none; padding: 10px 18px; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; height: 250px; display: flex; flex-direction: column; overflow: hidden; }
        .card-h { padding: 8px 12px; background: rgba(255,255,255,0.03); font-size: 0.7rem; font-weight: 900; color: var(--blue); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .card-b { padding: 8px; overflow-y: auto; flex-grow: 1; }
        .news-item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .news-item a { color: #94a3b8; text-decoration: none; font-size: 0.8rem; display: block; }

        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div style="display:flex; align-items:center; gap:10px;">
        <img src="https://avatars.githubusercontent.com/u/70527971?v=4&size=64" class="logo">
        <span style="font-weight:900; color:var(--blue); letter-spacing:1px">CENTINELA NARRATIVE IA</span>
    </div>
    <div style="color:#10b981; font-size:0.65rem; font-weight:bold;"><i class="fas fa-bolt"></i> VIVO</div>
</div>

<div class="ai-terminal">
    <div class="ai-stats">
        <span id="f-count">FUENTES: --</span>
        <span id="n-count">DATA POINTS: --</span>
        <div id="dolar-val" class="dolar-badge">OFICIAL: $--</div>
        <span id="t-stamp" style="color:#64748b; margin-left:auto">--:--:--</span>
    </div>
    
    <div id="verdicto" class="verdict-box">Iniciando escaneo de mercado...</div>
    
    <div style="margin-top:20px;">
        <button class="update-btn" onclick="generarAnalisisReal()">
            <i class="fas fa-sync-alt"></i> ACTUALIZAR INFORME
        </button>
    </div>
</div>

<div id="master-grid" class="grid"></div>

<script>
    const NEWS_URL = "https://script.google.com/macros/s/AKfycbw_6kSGlPNmSytvAZcyQKZE1EFYTo7zuhp8Nt5YyOtCNoHcx_MAksyIe_TFvorL52EYwQ/exec";
    const DOLAR_URL = "https://dolarapi.com/v1/dolares/oficial";

    async function generarAnalisisReal() {
        const out = document.getElementById('verdicto');
        const grid = document.getElementById('master-grid');
        const dVal = document.getElementById('dolar-val');
        
        out.style.opacity = "0.5";
        out.innerHTML = "Sincronizando fuentes y precios...";
        
        try {
            // 1. OBTENER DÓLAR PRIMERO (Rápido)
            let oficialPrecio = 1415; // Valor por defecto si falla
            try {
                const resD = await fetch(DOLAR_URL);
                const dataD = await resD.json();
                oficialPrecio = dataD.venta || oficialPrecio;
                dVal.innerText = `OFICIAL: $${oficialPrecio}`;
            } catch(e) { console.warn("Error Dolar API"); }

            // 2. OBTENER NOTICIAS
            const res = await fetch(NEWS_URL);
            const data = await res.json();
            const noticias = data.noticias || [];

            if (noticias.length === 0) {
                out.innerHTML = "No se encontraron noticias en la base de datos.";
                return;
            }

            // Actualizar contadores
            document.getElementById('f-count').innerText = `FUENTES: ${new Set(noticias.map(n => n.fuente)).size}`;
            document.getElementById('n-count').innerText = `DATA POINTS: ${noticias.length}`;
            document.getElementById('t-stamp').innerText = new Date().toLocaleTimeString();

            // 3. MOTOR NARRATIVO
            const titulos = noticias.map(n => (n.titulo || "").toLowerCase());
            const find = (arr) => titulos.filter(t => arr.some(w => t.includes(w))).length;
            
            const c = {
                tasa: find(['lecap', 'tasa', 'letras', 'plazo fijo']),
                dolar: find(['dolar', 'mep', 'ccl', 'brecha']),
                merval: find(['merval', 'acciones', 'cedear'])
            };

            let v = `Con el **Dólar Oficial en $${oficialPrecio}**, `;
            if (c.tasa > c.dolar) {
                v += `la IA detecta que el **carry trade** domina la narrativa (${c.tasa} alertas de tasa). El mercado prioriza rendimientos en pesos. `;
            } else {
                v += `la IA observa una clara **preferencia por la cobertura** ante el ruido cambiario detectado en ${c.dolar} noticias clave. `;
            }

            if (c.merval > 3) v += `Se detecta además un flujo inusual de interés en el **sector de renta variable**. `;

            v += `\n\n**Estrategia:** ${c.tasa > c.dolar ? 'Aprovechar tasa real' : 'Migrar a activos Hard Dollar'} basándose en la densidad informativa actual.`;

            out.style.opacity = "1";
            out.innerHTML = v.replace(/\*\*(.*?)\*\*/g, '<b style="color:var(--gold)">$1</b>');

            // 4. RENDER DE TARJETAS
            const agrupados = noticias.reduce((acc, n) => {
                const f = n.fuente || "Otros";
                if(!acc[f]) acc[f] = [];
                acc[f].push(n);
                return acc;
            }, {});

            grid.innerHTML = Object.keys(agrupados).map(f => `
                <div class="card">
                    <div class="card-h">${f}</div>
                    <div class="card-b">
                        ${agrupados[f].map(n => `<div class="news-item"><a href="${n.link || '#'}" target="_blank">${n.titulo || 'Sin título'}</a></div>`).join('')}
                    </div>
                </div>
            `).join('');

        } catch (e) {
            console.error(e);
            out.style.opacity = "1";
            out.innerHTML = `<span style="color:#f87171">Error de sincronización. Verificá la URL del Script.</span>`;
        }
    }

    document.addEventListener('DOMContentLoaded', generarAnalisisReal);
</script>
</body>
</html>

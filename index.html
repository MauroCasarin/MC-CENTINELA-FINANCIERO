<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA - MONITOR DE MEDIOS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--border:#1e293b}
        body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:10px}
        .header{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);margin-bottom:15px;display:flex;justify-content:space-between;align-items:center;border-left:5px solid var(--blue);position:sticky;top:5px;z-index:100}
        .header h1{font-size:1rem;margin:0;letter-spacing:1px;text-transform:uppercase}
        .status{font-size:0.7rem;color:#64748b}
        .news-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(340px, 1fr));gap:15px}
        .news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:480px;box-shadow:0 4px 6px -1px rgba(0,0,0,0.1)}
        .card-header{padding:12px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .source-badge{font-size:0.7rem;font-weight:bold;padding:4px 8px;border-radius:4px;text-transform:uppercase}
        .news-body{padding:10px;overflow-y:auto;flex-grow:1}
        .news-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .news-item:last-child{border-bottom:none}
        .news-link{color:var(--txt);text-decoration:none;font-size:0.9rem;font-weight:500;line-height:1.4;display:block}
        .news-link:hover{color:var(--blue)}
        .news-time{font-size:0.65rem;color:var(--blue);display:block;margin-bottom:4px;font-weight:bold}
        .btn-refresh{background:var(--blue);border:none;padding:10px 15px;border-radius:8px;cursor:pointer;color:#000;font-weight:bold;transition:0.2s}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
        @media (max-width: 600px) { .news-grid{grid-template-columns: 1fr} }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1><i class="fas fa-broadcast-tower"></i> Centinela Intel</h1>
        <div class="status" id="last-update">Sincronizando feeds...</div>
    </div>
    <button class="btn-refresh" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
</div>

<div id="main-grid" class="news-grid">
    <div style="grid-column:1/-1; text-align:center; padding:100px; opacity:0.5">
        <i class="fas fa-circle-notch fa-spin fa-3x"></i><br><br>Cargando medios argentinos...
    </div>
</div>

<script>
    // TU URL DE GOOGLE APPS SCRIPT
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbzoJKlDUEYCffrTQmWDiLijzD-A5cq5_LVLeI6aqkuqmuiyhdpfMBF6IpFnCgisyHqzFQ/exec";

    const COLORS = {
        "Ámbito": "#10b981", "Cronista": "#f59e0b", "Infobae": "#ef4444",
        "La Nación": "#3b82f6", "Clarín": "#ffffff", "Página 12": "#a855f7",
        "El Economista": "#06b6d4", "Perfil": "#ec4899"
    };

    async function fetchData() {
        const grid = document.getElementById('main-grid');
        const status = document.getElementById('last-update');
        
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            // Agrupar noticias por fuente
            const grouped = data.reduce((acc, item) => {
                if (!acc[item.fuente]) acc[item.fuente] = [];
                acc[item.fuente].push(item);
                return acc;
            }, {});

            grid.innerHTML = '';
            
            Object.keys(grouped).forEach(fuente => {
                const color = COLORS[fuente] || "#6366f1";
                const textColor = fuente === 'Clarín' ? '#000' : '#fff';
                
                let itemsHtml = grouped[fuente].map(n => {
                    let hora = "Ahora";
                    if(n.fecha) {
                        const d = new Date(n.fecha);
                        hora = d.toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'}) + " HS";
                    }
                    return `
                        <div class="news-item">
                            <span class="news-time">${hora}</span>
                            <a href="${n.link}" target="_blank" class="news-link">${n.titulo}</a>
                        </div>
                    `;
                }).join('');

                grid.innerHTML += `
                    <div class="news-card">
                        <div class="card-header">
                            <span class="source-badge" style="background:${color}; color:${textColor}">${fuente}</span>
                            <i class="far fa-newspaper" style="opacity:0.2"></i>
                        </div>
                        <div class="news-body">${itemsHtml}</div>
                    </div>
                `;
            });

            status.innerHTML = `<i class="fas fa-check-circle" style="color:#10b981"></i> Online: ${new Date().toLocaleTimeString()}`;

        } catch (e) {
            status.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#ef4444"></i> Error de conexión`;
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:50px; opacity:0.5">Fallo al conectar con Google Script.</div>`;
        }
    }

    fetchData();
    setInterval(fetchData, 600000); // Actualiza cada 10 min
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CENTINELA INTEL - TERMINAL FINANCIERA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--card:#0f172a;--blue:#38bdf8;--txt:#f1f5f9;--border:#1e293b;--green:#10b981;--red:#ef4444}
        body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;margin:0;padding:10px}
        
        /* Panel Superior de Datos Reales */
        .market-bar{display:grid;grid-template-columns:repeat(2, 1fr);gap:10px;margin-bottom:15px}
        .stat-card{background:var(--card);padding:12px;border-radius:10px;border:1px solid var(--border);text-align:center;border-bottom:3px solid var(--blue)}
        .stat-label{font-size:0.65rem;color:#64748b;text-transform:uppercase;display:block;margin-bottom:5px}
        .stat-value{font-size:1.1rem;font-weight:bold;color:var(--blue)}

        /* Cabecera de la Terminal */
        .header-main{background:var(--blue);color:#000;padding:12px;border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
        .header-main h1{font-size:0.85rem;margin:0;font-weight:900;text-transform:uppercase}
        
        /* Grilla de Noticias */
        .news-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:15px}
        .news-card{background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:450px;overflow:hidden}
        .card-header{padding:12px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);font-size:0.7rem;font-weight:bold;color:var(--blue);text-transform:uppercase}
        
        .news-body{padding:10px;overflow-y:auto;flex-grow:1}
        .news-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
        .news-link{color:var(--txt);text-decoration:none;font-size:0.85rem;line-height:1.4;display:block}
        .news-link:hover{color:var(--blue)}
        .news-time{font-size:0.6rem;color:var(--blue);display:block;margin-bottom:4px;font-weight:bold}

        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
        @media (max-width: 600px) { .news-grid{grid-template-columns: 1fr} }
    </style>
</head>
<body>

<div class="market-bar">
    <div class="stat-card">
        <span class="stat-label">IPC EST. (INDEC)</span>
        <span class="stat-value" id="inf-dato">-- %</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">TNA PLAZO FIJO</span>
        <span class="stat-value" id="pf-dato">-- %</span>
    </div>
    <div class="stat-card">
        <span class="stat-label">DÓLAR BLUE</span>
        <span class="stat-value" id="blue-dato">$ --</span>
    </div>
    <div class="stat-card" style="border-bottom-color:var(--green)">
        <span class="stat-label">ESTADO RED</span>
        <span class="stat-value" id="status-red" style="font-size:0.8rem; color:var(--red)">OFFLINE</span>
    </div>
</div>

<div class="header-main">
    <h1><i class="fas fa-microchip"></i> Centinela Intelligence v3.0</h1>
    <i class="fas fa-sync-alt" onclick="fetchData()" style="cursor:pointer"></i>
</div>

<div id="main-grid" class="news-grid">
    <div style="grid-column:1/-1; text-align:center; padding-top:50px; opacity:0.5">
        <i class="fas fa-circle-notch fa-spin fa-2x"></i><br><br>Consolidando datos financieros reales...
    </div>
</div>

<script>
    // URL DE TU SCRIPT (Confirmada en image_07e931.png)
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbzoJKlDUEYCffrTQmWDiLijzD-A5cq5_LVLeI6aqkuqmuiyhdpfMBF6IpFnCgisyHqzFQ/exec";

    async function fetchData() {
        const grid = document.getElementById('main-grid');
        const statusRed = document.getElementById('status-red');
        
        try {
            const res = await fetch(PROXY_URL);
            const data = await res.json();
            
            // 1. Inyectar Indicadores Reales
            document.getElementById('inf-dato').innerText = data.indicadores.inflacion;
            document.getElementById('pf-dato').innerText = data.indicadores.tna_pf;
            document.getElementById('blue-dato').innerText = data.indicadores.dolar_blue;
            
            statusRed.innerText = "ONLINE";
            statusRed.style.color = "var(--green)";

            // 2. Agrupar Noticias por Diario
            const grouped = data.noticias.reduce((acc, item) => {
                if (!acc[item.fuente]) acc[item.fuente] = [];
                acc[item.fuente].push(item);
                return acc;
            }, {});

            grid.innerHTML = '';
            
            // 3. Crear Tarjetas de Diarios
            Object.keys(grouped).forEach(fuente => {
                let itemsHtml = grouped[fuente].map(n => {
                    let hora = n.fecha ? new Date(n.fecha).toLocaleTimeString('es-AR', {hour: '2-digit', minute:'2-digit'}) + " HS" : "AHORA";
                    return `
                        <div class="news-item">
                            <span class="news-time">${hora}</span>
                            <a href="${n.link}" target="_blank" class="news-link">${n.titulo}</a>
                        </div>
                    `;
                }).join('');

                grid.innerHTML += `
                    <div class="news-card">
                        <div class="card-header">${fuente}</div>
                        <div class="news-body">${itemsHtml}</div>
                    </div>
                `;
            });

        } catch (e) {
            statusRed.innerText = "ERROR";
            statusRed.style.color = "var(--red)";
            console.error("Fallo en la sincronización de datos.");
        }
    }

    // Iniciar carga
    fetchData();
    // Auto-actualización cada 5 minutos
    setInterval(fetchData, 300000); 
</script>

</body>
</html>
